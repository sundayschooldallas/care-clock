<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Care Clock">
<title>Care Clock</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#1D9E75;--green-l:#EAF3DE;--green-t:#3B6D11;
  --red:#E24B4A;--red-l:#FCEBEB;--red-t:#A32D2D;
  --amber:#EF9F27;--amber-l:#FAEEDA;--amber-t:#854F0B;
  --blue:#378ADD;--blue-l:#E6F1FB;--blue-t:#185FA5;
  --bg:#f5f5f3;--card:#fff;--bdr:rgba(0,0,0,.1);--bdr2:rgba(0,0,0,.18);
  --tx:#1a1a1a;--tx2:#555;--tx3:#999;--r:12px;--rs:8px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111;--card:#1e1e1e;--bdr:rgba(255,255,255,.1);--bdr2:rgba(255,255,255,.2);
  --tx:#f0f0f0;--tx2:#aaa;--tx3:#666;
  --green-l:#0a2e1e;--green-t:#5DCAA5;--red-l:#2e0a0a;--red-t:#F09595;
  --amber-l:#2e1e00;--amber-t:#FAC775;--blue-l:#0a1e2e;--blue-t:#85B7EB;
}}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
#app{max-width:520px;margin:0 auto;padding:1rem;min-height:100vh;}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem;}
.sec-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--tx3);margin-bottom:.75rem;}
.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.av-g{background:var(--green-l);color:var(--green-t);}
.av-b{background:var(--blue-l);color:var(--blue-t);}
.nav{display:flex;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rs);padding:3px;margin-bottom:1rem;gap:2px;}
.nav-tab{flex:1;padding:7px 4px;font-size:12px;font-weight:500;border-radius:6px;cursor:pointer;border:none;background:transparent;color:var(--tx2);}
.nav-tab.on{background:var(--bg);color:var(--tx);font-weight:700;}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
.b-green{background:var(--green-l);color:var(--green-t);}
.b-red{background:var(--red-l);color:var(--red-t);}
.b-blue{background:var(--blue-l);color:var(--blue-t);}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dg{background:var(--green);animation:pulse 1.5s infinite;}
.dr{background:var(--red);}
.da{background:var(--amber);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn{width:100%;padding:12px;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.98);}
.btn-g{background:var(--green);color:#fff;}
.btn-r{background:var(--red);color:#fff;}
.btn-b{background:var(--blue);color:#fff;}
.btn-o{background:transparent;border:1px solid var(--bdr2);color:var(--tx);}
.btn-o:hover{background:var(--bg);}
.btn:disabled{background:var(--bdr);color:var(--tx3);cursor:not-allowed;transform:none;}
.btn-sm{padding:6px 14px;font-size:13px;font-weight:500;border-radius:var(--rs);cursor:pointer;background:transparent;border:1px solid var(--bdr2);color:var(--tx2);}
.btn-icon{padding:6px 10px;font-size:13px;border-radius:var(--rs);cursor:pointer;background:transparent;border:1px solid var(--bdr2);color:var(--tx2);}
.fld{margin-bottom:.75rem;}
.fld label{display:block;font-size:13px;font-weight:500;color:var(--tx2);margin-bottom:4px;}
.fld input,.fld select,.fld textarea{width:100%;padding:9px 12px;font-size:14px;border:1px solid var(--bdr2);border-radius:var(--rs);background:var(--card);color:var(--tx);outline:none;transition:border .15s;font-family:inherit;}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(55,138,221,.12);}
.fld input::placeholder,.fld textarea::placeholder{color:var(--tx3);}
.fld textarea{resize:vertical;min-height:70px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.hint{font-size:12px;color:var(--tx3);margin-top:4px;line-height:1.4;}
.div{height:1px;background:var(--bdr);margin:.875rem 0;}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.met{background:var(--bg);border-radius:var(--rs);padding:.875rem;}
.met-l{font-size:11px;color:var(--tx3);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;}
.met-v{font-size:20px;font-weight:700;color:var(--tx);}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bdr);}
.row:last-child{border-bottom:none;}
.clock-big{font-size:44px;font-weight:300;letter-spacing:-2px;text-align:center;margin:.5rem 0;font-variant-numeric:tabular-nums;color:var(--tx);}
.clock-date{font-size:14px;color:var(--tx2);text-align:center;}
.clock-el{font-size:16px;font-weight:700;color:var(--green);text-align:center;margin-top:4px;font-variant-numeric:tabular-nums;}
.geo{font-size:13px;padding:10px 12px;border-radius:var(--rs);margin-bottom:.75rem;display:flex;align-items:flex-start;gap:8px;line-height:1.5;}
.geo-ok{background:var(--green-l);color:var(--green-t);}
.geo-fail{background:var(--red-l);color:var(--red-t);}
.geo-neu{background:var(--amber-l);color:var(--amber-t);}
.info-row{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--bdr);}
.info-row:last-child{border-bottom:none;}
.info-key{font-size:12px;color:var(--tx3);min-width:120px;padding-top:1px;font-weight:500;}
.info-val{font-size:13px;color:var(--tx);line-height:1.5;}
.empty{font-size:14px;color:var(--tx3);text-align:center;padding:2rem 1rem;}
.smsg{font-size:13px;min-height:18px;margin-bottom:.75rem;line-height:1.5;}
.mok{color:var(--green-t);}.merr{color:var(--red-t);}.mneu{color:var(--tx3);}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--bdr);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes sp{to{transform:rotate(360deg)}}
.noti{font-size:12px;color:var(--tx3);text-align:center;margin-top:.5rem;line-height:1.4;}
.wdl{font-size:12px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin:.75rem 0 4px;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem;}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spin" style="width:24px;height:24px;border-width:3px"></div><p style="color:var(--tx2);font-size:14px">Loading Care Clock...</p></div></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,signOut,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,doc,setDoc,getDoc,getDocs,collection,addDoc,updateDoc,deleteDoc,query,where,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig={
  apiKey:"AIzaSyD4JelsMu_NGt3lo9pOYtGgHW0msoUzuQ4",
  authDomain:"care-clock-2adcd.firebaseapp.com",
  projectId:"care-clock-2adcd",
  storageBucket:"care-clock-2adcd.firebasestorage.app",
  messagingSenderId:"345647037416",
  appId:"1:345647037416:web:f68c4f541ebf995ca7025d"
};

const fireApp=initializeApp(firebaseConfig);
const auth=getAuth(fireApp);
const db=getFirestore(fireApp);

// ── STATE ──
let VIEW='loading'; // loading | login | supervisor | caregiver
let SUP_TAB='dashboard';
let CG_TAB='clock';
let CURRENT_USER=null;
let USER_ROLE=null;
let CG_PROFILE=null;
let IS_SUP_SESSION=false; // track that we are supervisor so auth changes don't kick us out
let EDIT_CG=null;
let EDIT_CL=null;
let EDIT_AS=null;
let CLOCKED_IN=false;
let CLOCK_IN_TIME=null;
let OPEN_SESSION_ID=null;
let LOC_OK=false,LOC_CHECKED=false,LOC_DIST=null,LOC_ERR=null;
let TICK=null;
let DB={caregivers:[],clients:[],assignments:[],sessions:[]};

// ── UTILS ──
const $=id=>document.getElementById(id);
const ini=n=>(n||'?').trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const uid=()=>Math.random().toString(36).slice(2,9);
function toRad(v){return v*Math.PI/180;}
function distFt(a,b,c,d){const R=3958.8,dL=toRad(c-a),dO=toRad(d-b),x=Math.sin(dL/2)**2+Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dO/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))*5280;}
function fT(ts){return new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function fT2(ts){return new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}
function fD(ts){return new Date(ts).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});}
function fDs(ts){return new Date(ts).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function fEl(ms){const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return`${h}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;}
function fHM(ms){const t=Math.floor(ms/60000),h=Math.floor(t/60),m=t%60;return`${h}h ${m}m`;}
function tsMs(ts){if(!ts)return 0;if(typeof ts==='number')return ts;if(ts.toMillis)return ts.toMillis();if(ts.seconds)return ts.seconds*1000;return new Date(ts).getTime();}
function setMsg(id,html,cls){const e=$(id);if(e){e.className='smsg '+cls;e.innerHTML=html;}}
function showLoading(id,msg){setMsg(id,`<span class="spin"></span>${msg||'Saving...'}`, 'mneu');}

// ── FIRESTORE ──
async function fsGet(col,id){const d=await getDoc(doc(db,col,id));return d.exists()?{id:d.id,...d.data()}:null;}
async function fsSet(col,id,data){await setDoc(doc(db,col,id),data,{merge:true});}
async function fsAdd(col,data){const r=await addDoc(collection(db,col),data);return r.id;}
async function fsDel(col,id){await deleteDoc(doc(db,col,id));}
async function fsAll(col){const s=await getDocs(collection(db,col));return s.docs.map(d=>({id:d.id,...d.data()}));}
async function fsWhere(col,field,op,val){const q=query(collection(db,col),where(field,op,val));const s=await getDocs(q);return s.docs.map(d=>({id:d.id,...d.data()}));}

async function loadCache(){
  const[cgs,cls,ass,sess]=await Promise.all([fsAll('caregivers'),fsAll('clients'),fsAll('assignments'),fsAll('sessions')]);
  DB.caregivers=cgs; DB.clients=cls; DB.assignments=ass; DB.sessions=sess;
}

function getCG(id){return DB.caregivers.find(c=>c.id===id);}
function getCL(id){return DB.clients.find(c=>c.id===id);}
function getAS(cgId){return DB.assignments.find(a=>a.cgId===cgId);}
function todaySess(cgId){const t=new Date().toDateString();return DB.sessions.filter(s=>s.cgId===cgId&&s.outTime&&new Date(tsMs(s.inTime)).toDateString()===t);}
function weekSess(cgId){const now=new Date(),d=now.getDay(),st=new Date(now);st.setDate(now.getDate()-d);st.setHours(0,0,0,0);return DB.sessions.filter(s=>s.cgId===cgId&&s.outTime&&new Date(tsMs(s.inTime))>=st);}
function allSess(cgId){return DB.sessions.filter(s=>s.cgId===cgId&&s.outTime);}
function totMs(arr){return arr.reduce((s,x)=>s+(tsMs(x.outTime)-tsMs(x.inTime)),0);}

// ── AUTH STATE (only handles initial login/logout, not page navigation) ──
let authReady=false;
onAuthStateChanged(auth,async user=>{
  if(IS_SUP_SESSION) return; // supervisor adding caregivers won't trigger this
  if(user){
    CURRENT_USER=user;
    const sup=await fsGet('settings','supervisor');
    if(sup&&sup.email===user.email){
      USER_ROLE='supervisor';IS_SUP_SESSION=true;
      await loadCache();
      VIEW='supervisor'; SUP_TAB='dashboard';
    } else {
      const cgs=await fsWhere('caregivers','email','==',user.email);
      if(cgs.length){
        USER_ROLE='caregiver'; CG_PROFILE=cgs[0];
        await loadCache();
        const open=DB.sessions.find(s=>s.cgId===cgs[0].id&&!s.outTime);
        if(open){CLOCKED_IN=true;CLOCK_IN_TIME=tsMs(open.inTime);OPEN_SESSION_ID=open.id;}
        VIEW='caregiver'; CG_TAB='clock';
      } else { await signOut(auth); VIEW='login'; }
    }
  } else {
    CURRENT_USER=null; USER_ROLE=null; CG_PROFILE=null; IS_SUP_SESSION=false;
    VIEW='login';
  }
  render();
});

// ── RENDER ──
function render(){
  clearInterval(TICK);
  const app=$('app');
  if(VIEW==='loading'){app.innerHTML=`<div class="loading"><div class="spin" style="width:24px;height:24px;border-width:3px"></div><p style="color:var(--tx2);font-size:14px">Loading...</p></div>`;return;}
  if(VIEW==='login'){app.innerHTML=buildLogin();attachLoginEvents();return;}
  if(VIEW==='supervisor'){app.innerHTML=buildSupervisor();return;}
  if(VIEW==='caregiver'){app.innerHTML=buildCaregiver();if(CG_TAB==='clock')startTick();return;}
}

// ════════════════════════════════════════
// LOGIN
// ════════════════════════════════════════
function buildLogin(){
  return`<div style="padding:2rem 0">
  <div style="text-align:center;margin-bottom:1.5rem">
    <div style="width:64px;height:64px;border-radius:50%;background:var(--green-l);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:28px">&#128305;</div>
    <div style="font-size:26px;font-weight:700;color:var(--tx)">Care Clock</div>
    <div style="font-size:14px;color:var(--tx2);margin-top:4px">Secure caregiver management</div>
  </div>
  <div class="card">
    <div class="fld"><label>Email</label><input id="l-em" type="email" placeholder="your@email.com" autocomplete="email"></div>
    <div class="fld"><label>Password</label><input id="l-pw" type="password" placeholder="Password" autocomplete="current-password"></div>
    <div id="l-msg" class="smsg merr" style="min-height:16px"></div>
    <button class="btn btn-g" id="l-btn" onclick="window.doLogin()">Sign in</button>
  </div>
  <div id="sup-setup-wrap">
    <div style="text-align:center;font-size:12px;color:var(--tx3);margin:.75rem 0">First time? Create your supervisor account</div>
    <div class="card" style="border:1px dashed var(--bdr2)">
      <div style="font-size:13px;font-weight:600;color:var(--tx);margin-bottom:.75rem">&#128274; First-time supervisor setup</div>
      <div class="fld"><label>Your email</label><input id="s-em" type="email" placeholder="supervisor@email.com"></div>
      <div class="fld"><label>Create password (min 6 chars)</label><input id="s-pw" type="password" placeholder="Password"></div>
      <div id="s-msg" class="smsg mneu" style="min-height:16px"></div>
      <button class="btn btn-b" onclick="window.doSetupSup()">Create supervisor account</button>
    </div>
  </div>
</div>`;
}

function attachLoginEvents(){
  // hide setup if supervisor already exists
  fsGet('settings','supervisor').then(s=>{
    const w=$('sup-setup-wrap');
    if(s&&w) w.style.display='none';
  });
  const p=$('l-pw');
  if(p) p.onkeydown=e=>{if(e.key==='Enter')window.doLogin();};
}

window.doLogin=async function(){
  const em=($('l-em').value||'').trim();
  const pw=($('l-pw').value||'').trim();
  if(!em||!pw){setMsg('l-msg','Please enter email and password.','merr');return;}
  const btn=$('l-btn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>Signing in...';
  try{await signInWithEmailAndPassword(auth,em,pw);}
  catch(e){
    let m='Incorrect email or password.';
    if(e.code==='auth/too-many-requests')m='Too many attempts. Try again later.';
    setMsg('l-msg',m,'merr');
    btn.disabled=false;btn.innerHTML='Sign in';
  }
};

window.doSetupSup=async function(){
  const em=($('s-em').value||'').trim();
  const pw=($('s-pw').value||'').trim();
  if(!em||!pw){setMsg('s-msg','Please fill in both fields.','merr');return;}
  if(pw.length<6){setMsg('s-msg','Password must be at least 6 characters.','merr');return;}
  setMsg('s-msg','<span class="spin"></span>Creating account...','mneu');
  try{
    await createUserWithEmailAndPassword(auth,em,pw);
    await fsSet('settings','supervisor',{email:em,createdAt:Date.now()});
  } catch(e){
    let m='Could not create account.';
    if(e.code==='auth/email-already-in-use')m='Account exists. Try signing in above.';
    setMsg('s-msg',m,'merr');
  }
};

// ════════════════════════════════════════
// SUPERVISOR
// ════════════════════════════════════════
function buildSupervisor(){
  const tabs=['dashboard','caregivers','clients','assignments','reports'];
  const labels=['Dashboard','Caregivers','Clients','Assign','Reports'];
  let tabHtml=tabs.map((t,i)=>`<button class="nav-tab ${SUP_TAB===t?'on':''}" onclick="window.supTab('${t}')">${labels[i]}</button>`).join('');
  let body='';
  if(SUP_TAB==='dashboard') body=buildSupDash();
  else if(SUP_TAB==='caregivers') body=buildSupCG();
  else if(SUP_TAB==='clients') body=buildSupCL();
  else if(SUP_TAB==='assignments') body=buildSupAS();
  else if(SUP_TAB==='reports') body=buildSupReports();
  return`
  <div class="hrow">
    <div><div style="font-size:20px;font-weight:700;color:var(--tx)">Supervisor Portal</div><div style="font-size:13px;color:var(--tx2)">Care Clock Management</div></div>
    <button class="btn-sm" onclick="window.doLogout()">Sign out</button>
  </div>
  <div class="nav">${tabHtml}</div>
  ${body}`;
}

window.supTab=function(t){SUP_TAB=t;EDIT_CG=null;EDIT_CL=null;EDIT_AS=null;render();};

// Dashboard
function buildSupDash(){
  const active=DB.sessions.filter(s=>!s.outTime);
  const today=DB.sessions.filter(s=>s.outTime&&new Date(tsMs(s.inTime)).toDateString()===new Date().toDateString());
  const activeRows=active.length?active.map(s=>{
    const cg=getCG(s.cgId);const as=getAS(s.cgId);const cl=as?getCL(as.clientId):null;
    return`<div class="row">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="av av-g">${ini(cg?.name)}</div>
        <div>
          <div style="font-size:14px;font-weight:600;color:var(--tx)">${cg?.name||'Unknown'}</div>
          <div style="font-size:12px;color:var(--tx2)">${cl?cl.name:'No assignment'} &bull; since ${fT2(tsMs(s.inTime))}</div>
        </div>
      </div>
      <div class="badge b-green"><div class="dot dg"></div>Active</div>
    </div>`;}).join(''):`<div class="empty">No one clocked in right now</div>`;
  return`
  <div class="mgrid">
    <div class="met"><div class="met-l">Caregivers</div><div class="met-v">${DB.caregivers.length}</div></div>
    <div class="met"><div class="met-l">Clients</div><div class="met-v">${DB.clients.length}</div></div>
    <div class="met"><div class="met-l">Active now</div><div class="met-v" style="color:var(--green)">${active.length}</div></div>
    <div class="met"><div class="met-l">Shifts today</div><div class="met-v">${today.length}</div></div>
  </div>
  <div class="card"><div class="sec-label">Currently clocked in</div>${activeRows}</div>
  <div class="card">
    <div class="sec-label">Quick actions</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <button class="btn btn-o" onclick="window.supTab('caregivers')">+ Add caregiver</button>
      <button class="btn btn-o" onclick="window.supTab('clients')">+ Add client</button>
      <button class="btn btn-o" onclick="window.supTab('assignments')">+ Assign</button>
      <button class="btn btn-o" onclick="window.supTab('reports')">View reports</button>
    </div>
  </div>`;
}

// Caregivers
function buildSupCG(){
  const ed=EDIT_CG;
  const listRows=DB.caregivers.length?DB.caregivers.map(cg=>{
    const as=getAS(cg.id);const cl=as?getCL(as.clientId):null;
    const tms=totMs(todaySess(cg.id));
    return`<div class="row">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="av av-g">${ini(cg.name)}</div>
        <div>
          <div style="font-size:14px;font-weight:600;color:var(--tx)">${cg.name}</div>
          <div style="font-size:12px;color:var(--tx2)">${cg.email}</div>
          <div style="font-size:12px;color:var(--tx3)">${cl?'Client: '+cl.name:'No assignment'} &bull; Today: ${fHM(tms)}</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        <button class="btn-icon" onclick="window.editCG('${cg.id}')">&#9998;</button>

window.pinCL=function(){
  const btn=$('cl-pin-btn'),st=$('cl-pin-st');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>Getting GPS...';}
  navigator.geolocation.getCurrentPosition(pos=>{
    window._clLat=pos.coords.latitude;window._clLng=pos.coords.longitude;
    if(st){st.style.color='var(--green-t)';st.textContent=`Pinned: ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;}
    if(btn){btn.disabled=false;btn.innerHTML='&#x2713; Pinned!';}
  },err=>{
    if(st){st.style.color='var(--red-t)';st.textContent=err.code===1?'Permission denied.':'Could not get location.';}
    if(btn){btn.disabled=false;btn.innerHTML='&#x1F4CD; Pin location';}
  },{enableHighAccuracy:true,timeout:12000,maximumAge:0});
};

window.exportCSV=function(){
  const hdr=['Caregiver','Email','Client','Date','Clock In','Clock Out','Hrs','Min'];
  const rows=DB.sessions.filter(s=>s.outTime).map(s=>{
    const cg=getCG(s.cgId);const as=getAS(s.cgId);const cl=as?getCL(as.clientId):null;
    const ms=tsMs(s.outTime)-tsMs(s.inTime);
    return[cg?.name||'',cg?.email||'',cl?.name||'',fDs(tsMs(s.inTime)),fT2(tsMs(s.inTime)),fT2(tsMs(s.outTime)),(ms/3600000).toFixed(2),Math.round(ms/60000)];
  });
  const csv=[hdr,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='care_clock_report.csv';a.click();URL.revokeObjectURL(url);
};

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <div class="met"><div class="met-l">Today</div><div style="font-size:15px;font-weight:700;color:var(--tx)">${fHM(totMs(today))}</div></div>
      <div class="met"><div class="met-l">This week</div><div style="font-size:15px;font-weight:700;color:var(--tx)">${fHM(totMs(week))}</div></div>
      <div class="met"><div class="met-l">All time</div><div style="font-size:15px;font-weight:700;color:var(--tx)">${fHM(totMs(all))}</div></div>
    </div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
      <div class="sec-label" style="margin:0">This week</div>
      <span style="font-size:14px;font-weight:700;color:var(--green)">${fHM(totMs(week))}</span>
    </div>
    ${weekRows}
  </div>`;
}

// ── GEO ──
window.checkGeo=function(){
  const btn=$('geo-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>Getting location...';}
  const as=getAS(CG_PROFILE?.id);
  const cl=as?getCL(as.clientId):null;
  if(!cl?.lat){LOC_CHECKED=true;LOC_OK=false;LOC_ERR='No location set.';render();return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{const d=distFt(pos.coords.latitude,pos.coords.longitude,cl.lat,cl.lng);LOC_CHECKED=true;LOC_DIST=d;LOC_OK=d<=100;LOC_ERR=null;render();},
    err=>{LOC_CHECKED=true;LOC_OK=false;LOC_DIST=null;LOC_ERR=err.code===1?'Permission denied.':'Could not get location.';render();},
    {enableHighAccuracy:true,timeout:12000,maximumAge:30000}
  );
};

// ── CLOCK IN/OUT ──
window.doClock=async function(){
  const cg=CG_PROFILE;
  if(CLOCKED_IN){
    await fsSet('sessions',OPEN_SESSION_ID,{outTime:Date.now()});
    CLOCKED_IN=false;CLOCK_IN_TIME=null;OPEN_SESSION_ID=null;
  } else {
    const sid=uid();
    await fsSet('sessions',sid,{cgId:cg.id,inTime:Date.now(),outTime:null,createdAt:Date.now()});
    CLOCKED_IN=true;CLOCK_IN_TIME=Date.now();OPEN_SESSION_ID=sid;
  }
  await loadCache(); render();
};

// ── TICK ──
function startTick(){
  clearInterval(TICK);
  TICK=setInterval(()=>{
    const cf=$('cf');if(cf)cf.textContent=fT(Date.now());
    const ed=$('eld');if(ed&&CLOCKED_IN&&CLOCK_IN_TIME)ed.textContent=fEl(Date.now()-CLOCK_IN_TIME);
  },1000);
}

// ── LOGOUT ──
window.doLogout=async function(){
  clearInterval(TICK);
  IS_SUP_SESSION=false;
  CLOCKED_IN=false;CLOCK_IN_TIME=null;
  LOC_OK=false;LOC_CHECKED=false;
  CG_PROFILE=null;USER_ROLE=null;
  await signOut(auth);
};

</script>
