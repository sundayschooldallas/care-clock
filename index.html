<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Care Clock">
<title>Care Clock</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#1D9E75;--gl:#EAF3DE;--gt:#3B6D11;--red:#E24B4A;--rl:#FCEBEB;--rt:#A32D2D;--amb:#EF9F27;--al:#FAEEDA;--at:#854F0B;--blue:#378ADD;--bl:#E6F1FB;--bt:#185FA5;--bg:#f5f5f3;--card:#fff;--b1:rgba(0,0,0,.1);--b2:rgba(0,0,0,.18);--tx:#1a1a1a;--t2:#555;--t3:#999;--r:12px;--rs:8px}
@media(prefers-color-scheme:dark){:root{--bg:#111;--card:#1e1e1e;--b1:rgba(255,255,255,.1);--b2:rgba(255,255,255,.2);--tx:#f0f0f0;--t2:#aaa;--t3:#666;--gl:#0a2e1e;--gt:#5DCAA5;--rl:#2e0a0a;--rt:#F09595;--al:#2e1e00;--at:#FAC775;--bl:#0a1e2e;--bt:#85B7EB}}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#app{max-width:520px;margin:0 auto;padding:1rem;min-height:100vh}
.card{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem}
.sl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-bottom:.75rem}
.hr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.avg{background:var(--gl);color:var(--gt)}.avb{background:var(--bl);color:var(--bt)}
.nav{display:flex;background:var(--card);border:1px solid var(--b1);border-radius:var(--rs);padding:3px;margin-bottom:1rem;gap:2px}
.nt{flex:1;padding:7px 2px;font-size:12px;font-weight:500;border-radius:6px;cursor:pointer;border:none;background:transparent;color:var(--t2)}
.nt.on{background:var(--bg);color:var(--tx);font-weight:700}
.bdg{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.bg{background:var(--gl);color:var(--gt)}.br{background:var(--rl);color:var(--rt)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dg{background:var(--green);animation:pu 1.5s infinite}.dr{background:var(--red)}.da{background:var(--amb)}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}
.btn{width:100%;padding:12px;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.98)}
.btng{background:var(--green);color:#fff}.btnr{background:var(--red);color:#fff}.btnb{background:var(--blue);color:#fff}
.btno{background:transparent;border:1px solid var(--b2);color:var(--tx)}
.btn:disabled{background:var(--b1);color:var(--t3);cursor:not-allowed;transform:none}
.bsm{padding:6px 12px;font-size:12px;font-weight:500;border-radius:var(--rs);cursor:pointer;background:transparent;border:1px solid var(--b2);color:var(--t2)}
.bic{padding:6px 10px;font-size:13px;border-radius:var(--rs);cursor:pointer;background:transparent;border:1px solid var(--b2);color:var(--t2)}
.fld{margin-bottom:.75rem}.fld label{display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:4px}
.fld input,.fld select,.fld textarea{width:100%;padding:9px 12px;font-size:14px;border:1px solid var(--b2);border-radius:var(--rs);background:var(--card);color:var(--tx);outline:none;font-family:inherit}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(55,138,221,.12)}
.fld textarea{resize:vertical;min-height:70px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hint{font-size:12px;color:var(--t3);margin-top:4px;line-height:1.4}
.div{height:1px;background:var(--b1);margin:.875rem 0}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.met{background:var(--bg);border-radius:var(--rs);padding:.875rem}
.ml{font-size:11px;color:var(--t3);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.mv{font-size:20px;font-weight:700}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--b1)}
.row:last-child{border-bottom:none}
.cbig{font-size:44px;font-weight:300;letter-spacing:-2px;text-align:center;margin:.5rem 0;font-variant-numeric:tabular-nums}
.cdate{font-size:14px;color:var(--t2);text-align:center}
.cel{font-size:16px;font-weight:700;color:var(--green);text-align:center;margin-top:4px;font-variant-numeric:tabular-nums}
.geo{font-size:13px;padding:10px 12px;border-radius:var(--rs);margin-bottom:.75rem;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.gok{background:var(--gl);color:var(--gt)}.gfail{background:var(--rl);color:var(--rt)}.gneu{background:var(--al);color:var(--at)}
.ir{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--b1)}.ir:last-child{border-bottom:none}
.ik{font-size:12px;color:var(--t3);min-width:120px;font-weight:500}.iv{font-size:13px;color:var(--tx);line-height:1.5}
.empty{font-size:14px;color:var(--t3);text-align:center;padding:2rem 1rem}
.msg{font-size:13px;min-height:18px;margin-bottom:.75rem;line-height:1.5}
.mok{color:var(--gt)}.merr{color:var(--rt)}.mneu{color:var(--t3)}
.spin{display:inline-block;width:12px;height:12px;border:2px solid var(--b1);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}
.noti{font-size:12px;color:var(--t3);text-align:center;margin-top:.5rem;line-height:1.4}
.wdl{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin:.75rem 0 4px}
.lkb{font-size:10px;font-weight:700;background:var(--rl);color:var(--rt);padding:2px 6px;border-radius:20px;margin-left:4px}
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:.75rem}
</style>
</head>
<body>
<div id="app"><div class="loader"><div class="spin" style="width:24px;height:24px;border-width:3px"></div><p style="color:var(--t2);font-size:14px">Loading Care Clock...</p></div></div>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,signOut,onAuthStateChanged,sendPasswordResetEmail,updatePassword}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,doc,setDoc,getDoc,getDocs,collection,addDoc,deleteDoc,query,where}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const fbApp=initializeApp({apiKey:"AIzaSyD4JelsMu_NGt3lo9pOYtGgHW0msoUzuQ4",authDomain:"care-clock-2adcd.firebaseapp.com",projectId:"care-clock-2adcd",storageBucket:"care-clock-2adcd.firebasestorage.app",messagingSenderId:"345647037416",appId:"1:345647037416:web:f68c4f541ebf995ca7025d"});
const auth=getAuth(fbApp),db=getFirestore(fbApp);
const fsGet=async(c,i)=>{try{const d=await getDoc(doc(db,c,i));return d.exists()?{id:d.id,...d.data()}:null;}catch(e){return null;}};
const fsSet=async(c,i,d)=>setDoc(doc(db,c,i),d,{merge:true});
const fsAdd=async(c,d)=>{const r=await addDoc(collection(db,c),d);return r.id;};
const fsDel=async(c,i)=>{try{await deleteDoc(doc(db,c,i));}catch(e){}};
const fsAll=async(c)=>{try{const s=await getDocs(collection(db,c));return s.docs.map(d=>({id:d.id,...d.data()}));}catch(e){return[];}};
const fsQ=async(c,f,op,v)=>{try{const q=query(collection(db,c),where(f,op,v));const s=await getDocs(q);return s.docs.map(d=>({id:d.id,...d.data()}));}catch(e){return[];}};
const S={view:'loading',stab:'dash',ctab:'clock',user:null,role:null,cgp:null,isSup:false,eCG:null,eCL:null,eAS:null,lOk:false,lChk:false,lDist:null,lErr:null,cIn:false,cTime:null,cSid:null,tick:null,DB:{cgs:[],cls:[],ass:[],sess:[]}};
const $=id=>document.getElementById(id);
const ini=n=>(n||'?').trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const uid=()=>Math.random().toString(36).slice(2,9);
const lkk=e=>btoa(encodeURIComponent(e||'')).replace(/[^a-zA-Z0-9]/g,'').slice(0,40);
const toR=v=>v*Math.PI/180;
const dFt=(a,b,c,d)=>{const R=3958.8,dL=toR(c-a),dO=toR(d-b),x=Math.sin(dL/2)**2+Math.cos(toR(a))*Math.cos(toR(c))*Math.sin(dO/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))*5280;};
const fT=ts=>new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
const fT2=ts=>new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
const fD=ts=>new Date(ts).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
const fDs=ts=>new Date(ts).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
const fEl=ms=>{const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return`${h}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;};
const fHM=ms=>{const t=Math.floor(ms/60000),h=Math.floor(t/60),m=t%60;return`${h}h ${m}m`;};
const tsMs=ts=>{if(!ts)return 0;if(typeof ts==='number')return ts;if(ts?.toMillis)return ts.toMillis();if(ts?.seconds)return ts.seconds*1000;return 0;};
const sm=(id,h,c)=>{const e=$(id);if(e){e.className='msg '+c;e.innerHTML=h;}};
const sp=(m='Saving...')=>`<span class="spin"></span>${m}`;
const getCG=id=>S.DB.cgs.find(c=>c.id===id);
const getCL=id=>S.DB.cls.find(c=>c.id===id);
const getAS=id=>S.DB.ass.find(a=>a.cgId===id);
const tdS=id=>{const t=new Date().toDateString();return S.DB.sess.filter(s=>s.cgId===id&&s.outTime&&new Date(tsMs(s.inTime)).toDateString()===t);};
const wkS=id=>{const n=new Date(),d=n.getDay(),st=new Date(n);st.setDate(n.getDate()-d);st.setHours(0,0,0,0);return S.DB.sess.filter(s=>s.cgId===id&&s.outTime&&new Date(tsMs(s.inTime))>=st);};
const alS=id=>S.DB.sess.filter(s=>s.cgId===id&&s.outTime);
const totMs=arr=>arr.reduce((s,x)=>s+(tsMs(x.outTime)-tsMs(x.inTime)),0);
async function loadDB(){const[a,b,c,d]=await Promise.all([fsAll('caregivers'),fsAll('clients'),fsAll('assignments'),fsAll('sessions')]);S.DB={cgs:a,cls:b,ass:c,sess:d};await Promise.all(S.DB.cgs.map(async cg=>{const l=await fsGet('lockouts',lkk(cg.email||''));cg._locked=l?.locked===true;}));}
const isLocked=async em=>{const l=await fsGet('lockouts',lkk(em));return l?.locked===true;};
const recFail=async em=>{const k=lkk(em),l=await fsGet('lockouts',k)||{attempts:0};const a=(l.attempts||0)+1,lk=a>=2;await fsSet('lockouts',k,{email:em,attempts:a,locked:lk,updatedAt:Date.now()});return{attempts:a,locked:lk};};
const clrLock=async em=>fsDel('lockouts',lkk(em));

function render(){
  clearInterval(S.tick);
  const app=$('app');if(!app)return;
  if(S.view==='loading'){app.innerHTML=`<div class="loader"><div class="spin" style="width:24px;height:24px;border-width:3px"></div><p style="color:var(--t2);font-size:14px">Loading...</p></div>`;return;}
  if(S.view==='login'){app.innerHTML=bLogin();aLogin();return;}
  if(S.view==='sup'){app.innerHTML=bSup();return;}
  if(S.view==='cg'){app.innerHTML=bCG();if(S.ctab==='clock')sTick();}
}

function bLogin(){return`<div style="padding:2rem 0"><div style="text-align:center;margin-bottom:1.5rem"><div style="width:60px;height:60px;border-radius:50%;background:var(--gl);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:26px">&#128305;</div><div style="font-size:24px;font-weight:700">Care Clock</div><div style="font-size:13px;color:var(--t2);margin-top:4px">Secure caregiver management</div></div><div class="card"><div class="fld"><label>Email</label><input id="l-em" type="email" placeholder="your@email.com" autocomplete="email"></div><div class="fld"><label>Password</label><input id="l-pw" type="password" placeholder="Password" autocomplete="current-password"></div><div id="l-msg" class="msg merr" style="min-height:16px"></div><button class="btn btng" id="l-btn" onclick="window.appLogin()">Sign in</button></div><div id="sup-sw"><p style="text-align:center;font-size:12px;color:var(--t3);margin:.75rem 0">First time? Create supervisor account.</p><div class="card" style="border-style:dashed"><div style="font-size:13px;font-weight:600;margin-bottom:.75rem">&#128274; First-time supervisor setup</div><div class="fld"><label>Your email</label><input id="s-em" type="email" placeholder="supervisor@email.com"></div><div class="fld"><label>Password (min 6 chars)</label><input id="s-pw" type="password" placeholder="Create password"></div><div id="s-msg" class="msg mneu" style="min-height:16px"></div><button class="btn btnb" onclick="window.appSetup()">Create supervisor account</button></div></div></div>`;}
function aLogin(){fsGet('settings','supervisor').then(s=>{const w=$('sup-sw');if(s&&w)w.style.display='none';});const p=$('l-pw');if(p)p.onkeydown=e=>{if(e.key==='Enter')window.appLogin();};}

window.appLogin=async function(){
  const em=($('l-em')?.value||'').trim().toLowerCase(),pw=($('l-pw')?.value||'').trim();
  if(!em||!pw){sm('l-msg','Please enter email and password.','merr');return;}
  const btn=$('l-btn');if(btn){btn.disabled=true;btn.innerHTML=sp('Signing in...');}

  const sup=await fsGet('settings','supervisor');
  const isSup=!!(sup&&sup.email?.toLowerCase()===em);

  if(!isSup){
    // Check lockout
    if(await isLocked(em)){sm('l-msg','&#x1F512; Account locked. Contact your supervisor.','merr');if(btn){btn.disabled=false;btn.innerHTML='Sign in';}return;}

    // Find caregiver in Firestore
    const cgs=await fsQ('caregivers','email','==',em);
    if(!cgs.length){sm('l-msg','No account found with that email.','merr');if(btn){btn.disabled=false;btn.innerHTML='Sign in';}return;}
    const cg=cgs[0];
    const storedPass=(cg.tempPass||'').trim();

    // STEP 1: Always check tempPass first before trying Firebase Auth
    // This handles the case where Firebase Auth account was never created
    if(storedPass===pw){
      // Password matches Firestore - ensure Firebase Auth account exists then sign in
      try{
        // Try creating account (will fail if already exists)
        await createUserWithEmailAndPassword(auth,em,pw);
        await clrLock(em);
        return; // onAuthStateChanged handles the rest
      }catch(createErr){
        if(createErr.code==='auth/email-already-in-use'){
          // Account exists - sign in normally
          try{await signInWithEmailAndPassword(auth,em,pw);await clrLock(em);return;}
          catch(signInErr){
            // Firebase Auth password differs from Firestore - update it
            // This shouldn't happen but handle gracefully
            sm('l-msg','Login error. Please contact your supervisor to reset your password.','merr');
            if(btn){btn.disabled=false;btn.innerHTML='Sign in';}return;
          }
        }
        sm('l-msg','Could not create account: '+createErr.message,'merr');
        if(btn){btn.disabled=false;btn.innerHTML='Sign in';}return;
      }
    }

    // STEP 2: tempPass doesn't match - try Firebase Auth anyway (password may have been updated)
    try{
      await signInWithEmailAndPassword(auth,em,pw);
      await clrLock(em);return;
    }catch(authErr){
      // Wrong password
      const r=await recFail(em);
      if(r.locked)sm('l-msg','&#x1F512; Account locked after 2 failed attempts. Contact your supervisor.','merr');
      else sm('l-msg',`Incorrect password. ${2-r.attempts} attempt(s) left before lockout.`,'merr');
      if(btn){btn.disabled=false;btn.innerHTML='Sign in';}return;
    }
  }

  // Supervisor login - never lock out
  try{await signInWithEmailAndPassword(auth,em,pw);}
  catch(e){sm('l-msg',e.code==='auth/too-many-requests'?'Too many attempts. Try later.':'Incorrect password.','merr');if(btn){btn.disabled=false;btn.innerHTML='Sign in';}}
};
window.appSetup=async function(){
  const em=($('s-em')?.value||'').trim().toLowerCase(),pw=($('s-pw')?.value||'').trim();
  if(!em||!pw){sm('s-msg','Fill in both fields.','merr');return;}
  if(pw.length<6){sm('s-msg','Min 6 characters.','merr');return;}
  sm('s-msg',sp('Creating...'),'mneu');
  try{await createUserWithEmailAndPassword(auth,em,pw);await fsSet('settings','supervisor',{email:em,createdAt:Date.now()});}
  catch(e){sm('s-msg',e.code==='auth/email-already-in-use'?'Account exists. Sign in above.':'Error: '+e.message,'merr');}
};

function bSup(){
  const tabs=[['dash','Dashboard'],['cgs','Caregivers'],['cls','Clients'],['ass','Assign'],['rep','Reports']];
  const nav=tabs.map(([t,l])=>`<button class="nt ${S.stab===t?'on':''}" onclick="window.appStab('${t}')">${l}</button>`).join('');
  let body='';
  if(S.stab==='dash')body=bDash();
  else if(S.stab==='cgs')body=bCGs();
  else if(S.stab==='cls')body=bCLs();
  else if(S.stab==='ass')body=bASS();
  else if(S.stab==='rep')body=bRep();
  return`<div class="hr"><div><div style="font-size:19px;font-weight:700">Supervisor Portal</div><div style="font-size:12px;color:var(--t2)">Care Clock</div></div><button class="bsm" onclick="window.appLogout()">Sign out</button></div><div class="nav">${nav}</div>${body}`;
}
window.appStab=function(t){S.stab=t;S.eCG=null;S.eCL=null;S.eAS=null;render();};

function bDash(){
  const active=S.DB.sess.filter(s=>!s.outTime),today=S.DB.sess.filter(s=>s.outTime&&new Date(tsMs(s.inTime)).toDateString()===new Date().toDateString());
  const aRows=active.length?active.map(s=>{const cg=getCG(s.cgId),as=getAS(s.cgId),cl=as?getCL(as.clientId):null;return`<div class="row"><div style="display:flex;align-items:center;gap:10px"><div class="av avg">${ini(cg?.name)}</div><div><div style="font-size:14px;font-weight:600">${cg?.name||'?'}</div><div style="font-size:12px;color:var(--t2)">${cl?.name||'No client'} &bull; since ${fT2(tsMs(s.inTime))}</div></div></div><div class="bdg bg"><div class="dot dg"></div>Active</div></div>`;}).join(''):`<div class="empty">No one clocked in right now</div>`;
  return`<div class="mg"><div class="met"><div class="ml">Caregivers</div><div class="mv">${S.DB.cgs.length}</div></div><div class="met"><div class="ml">Clients</div><div class="mv">${S.DB.cls.length}</div></div><div class="met"><div class="ml">Active now</div><div class="mv" style="color:var(--green)">${active.length}</div></div><div class="met"><div class="ml">Shifts today</div><div class="mv">${today.length}</div></div></div><div class="card"><div class="sl">Currently clocked in</div>${aRows}</div><div class="card"><div class="sl">Quick actions</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><button class="btn btno" onclick="window.appStab('cgs')">+ Add caregiver</button><button class="btn btno" onclick="window.appStab('cls')">+ Add client</button><button class="btn btno" onclick="window.appStab('ass')">+ Assignment</button><button class="btn btno" onclick="window.appStab('rep')">Reports</button></div></div><div class="card"><div class="sl">Supervisor settings</div><div class="fld"><label>Change my password</label><input id="spw" type="password" placeholder="New password (min 6 chars)"></div><div id="spw-msg" class="msg mneu" style="min-height:14px"></div><button class="btn btno" style="margin-bottom:.75rem" onclick="window.appChPw()">Update password</button><div class="div"></div><p style="font-size:13px;color:var(--t2);margin-bottom:.75rem">Send password reset link to your supervisor email if locked out.</p><button class="btn btno" onclick="window.appResetPw()">&#128274; Send reset email</button><div id="sreset-msg" class="msg mneu" style="min-height:14px;margin-top:.5rem"></div></div>`;
}
window.appChPw=async function(){const p=($('spw')?.value||'').trim();if(p.length<6){sm('spw-msg','Min 6 characters.','merr');return;}try{await updatePassword(auth.currentUser,p);sm('spw-msg','Password updated!','mok');if($('spw'))$('spw').value='';}catch(e){sm('spw-msg','Error: '+e.message,'merr');}};
window.appResetPw=async function(){sm('sreset-msg',sp('Sending...'),'mneu');try{const sup=await fsGet('settings','supervisor');await sendPasswordResetEmail(auth,sup.email);sm('sreset-msg','Reset link sent to '+sup.email,'mok');}catch(e){sm('sreset-msg','Error: '+e.message,'merr');}};

function bCGs(){
  const ed=S.eCG;

window.appSaveCG=async function(){

  if(!S.eCG&&S.DB.cgs.find(c=>c.email?.toLowerCase()===email)){sm('cg-msg','A caregiver with that email already exists.','merr');return;}
  if(pw.length>=6&&S.DB.cgs.find(c=>c.tempPass===pw&&c.id!==S.eCG?.id)){sm('cg-msg','That password is already used by another caregiver.','merr');return;}
  sm('cg-msg',sp('Saving...'),'mneu');

};

window.appGeoLookup=async function(){
  const street=($('cst')?.value||'').trim(),city=($('ccy')?.value||'').trim(),state=($('csta')?.value||'').trim(),zip=($('czip')?.value||'').trim();
  const gs=$('geo-st'),btn=$('geo-btn');
  if(!street||!city||!state){if(gs){gs.style.color='var(--rt)';gs.textContent='Fill in street, city and state first.';}return;}
  if(btn){btn.disabled=true;btn.innerHTML=sp('Looking up...');}if(gs){gs.style.color='var(--t3)';gs.textContent='Searching...';}
  for(const q of[`${street}, ${city}, ${state} ${zip}`.trim(),`${street}, ${city}, ${state}`]){
    try{const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1&countrycodes=us`,{headers:{'Accept-Language':'en-US'}});const j=await r.json();if(j?.length){window._lat=parseFloat(j[0].lat);window._lng=parseFloat(j[0].lon);if(gs){gs.style.color='var(--gt)';gs.innerHTML='&#x2713; Found: '+window._lat.toFixed(5)+', '+window._lng.toFixed(5);}if(btn){btn.disabled=false;btn.innerHTML='&#x2713; GPS set!';}return;}}catch(e){}
  }
  if(gs){gs.style.color='var(--rt)';gs.textContent='Address not found. Check fields and try again.';}if(btn){btn.disabled=false;btn.innerHTML='&#x1F4CD; Look up GPS from address';}
};

function bRep(){

  const cg=S.cgp,as=getAS(cg.id),cl=as?getCL(as.clientId):null;

function bCGClock(cg,cl){
  const el=S.cIn&&S.cTime?Date.now()-S.cTime:0;
  let geo='';
  if(!cl)geo=`<div class="geo gneu"><div class="dot da" style="margin-top:3px"></div><span>No active assignment. Contact your supervisor.</span></div>`;
  else if(!cl.lat)geo=`<div class="geo gneu"><div class="dot da" style="margin-top:3px"></div><span>Care location not set. Contact your supervisor.</span></div>`;
  else if(!S.lChk)geo=`<div class="geo gneu"><div class="dot da" style="margin-top:3px"></div><span>Tap below to verify your location.</span></div>`;
  else if(S.lOk)geo=`<div class="geo gok"><div class="dot dg" style="margin-top:3px"></div><span>&#x2713; Within range &mdash; ${Math.round(S.lDist)} ft from ${cl.name}'s address (limit: ${cl.radiusFt||100} ft)</span></div>`;
  else geo=`<div class="geo gfail"><div class="dot dr" style="margin-top:3px"></div><span>${S.lDist!==null?`You are ${Math.round(S.lDist)} ft away. `:''}Must be within ${cl.radiusFt||100} ft of ${cl.name}'s address.</span></div>`;
  const badge=S.cIn?`<div class="bdg bg"><div class="dot dg"></div>Clocked in</div>`:`<div class="bdg br"><div class="dot dr"></div>Clocked out</div>`;
  const canC=!!(cl?.lat);
  const mb=S.cIn?`<button class="btn btnr" onclick="window.appClock()">Clock out</button>`:(canC&&S.lOk)?`<button class="btn btng" onclick="window.appClock()">Clock in</button>`:`<button class="btn" disabled>${!canC?'No assignment':'Must be within 100 ft'}</button>`;
  return`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">${badge}<div class="cel" id="cel" style="${S.cIn?'':'display:none'}">${fEl(el)}</div></div><div class="cbig" id="cface">${fT(Date.now())}</div><div class="cdate">${fD(Date.now())}</div><div class="div"></div>${geo}${canC?`<button class="btn btno" style="margin-bottom:.75rem" id="loc-btn" onclick="window.appCheckLoc()">&#x1F4CD; Verify my location</button>`:''} ${mb}${cl?`<div class="noti">Must be within ${cl.radiusFt||100} ft of ${[cl.street,cl.city,cl.state].filter(Boolean).join(', ')||cl.address||'care address'}</div>`:''}</div><div class="card"><div class="sl">Today</div><div class="mg"><div class="met"><div class="ml">Shifts</div><div class="mv">${tdS(cg.id).length}</div></div><div class="met"><div class="ml">Hours</div><div class="mv">${fHM(totMs(tdS(cg.id)))}</div></div></div></div>`;
}
function bCGAssign(cg,as,cl){
  if(!as||!cl)return`<div class="card"><div class="empty">No active assignment.<br>Contact your supervisor.</div></div>`;
  return`<div class="card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:1rem"><div class="av avb" style="width:48px;height:48px;font-size:16px">${ini(cl.name)}</div><div><div style="font-size:18px;font-weight:700">${cl.name}</div><div class="bdg bg" style="margin-top:4px">Active assignment</div></div></div><div class="div"></div><div class="sl">Client information</div><div class="ir"><div class="ik">Street</div><div class="iv">${[cl.street,cl.apt].filter(Boolean).join(', ')||'Not set'}</div></div><div class="ir"><div class="ik">City/State/ZIP</div><div class="iv">${[cl.city,cl.state,cl.zip].filter(Boolean).join(', ')||'-'}</div></div><div class="ir"><div class="ik">Work days</div><div class="iv">${as.workDays||cl.schedule||'Not specified'}</div></div><div class="ir"><div class="ik">Shift hours</div><div class="iv">${as.shiftStart&&as.shiftEnd?as.shiftStart+' \u2013 '+as.shiftEnd:'Not set'}</div></div><div class="ir"><div class="ik">Clock-in radius</div><div class="iv">${cl.radiusFt||100} ft from care address</div></div><div class="ir"><div class="ik">Min hours/day</div><div class="iv">${as.minHours?as.minHours+'h minimum':'Not set'}</div></div><div class="ir"><div class="ik">Start date</div><div class="iv">${as.startDate||'Not set'}</div></div><div class="ir"><div class="ik">End date</div><div class="iv">${as.endDate||'Ongoing'}</div></div>${cl.notes?`<div class="ir"><div class="ik">Care notes</div><div class="iv">${cl.notes}</div></div>`:''}</div><div class="card"><div class="sl">Emergency contact</div>${cl.ecName?.trim()?`<div class="ir"><div class="ik">Name</div><div class="iv">${cl.ecName}</div></div><div class="ir"><div class="ik">Phone</div><div class="iv"><a href="tel:${cl.ecPhone}" style="color:var(--blue);font-weight:600">${cl.ecPhone}</a></div></div><div class="ir"><div class="ik">Relationship</div><div class="iv">${cl.ecRel||'Not specified'}</div></div>`:`<div class="empty">No emergency contact on file</div>`}</div>`;
}
function bCGHours(cg){
  const td=tdS(cg.id),wk=wkS(cg.id),al=alS(cg.id),gr={};
  wk.forEach(s=>{const d=fDs(tsMs(s.inTime));(gr[d]=gr[d]||[]).push(s);});
  const wr=Object.keys(gr).length?Object.entries(gr).map(([d,ss])=>`<div class="wdl">${d}</div>${ss.map((s,i)=>`<div class="row"><span style="font-size:14px;color:var(--t2)">Shift ${i+1} &nbsp;${fT2(tsMs(s.inTime))}&ndash;${fT2(tsMs(s.outTime))}</span><span style="font-size:14px;font-weight:600;color:var(--green)">${fHM(tsMs(s.outTime)-tsMs(s.inTime))}</span></div>`).join('')}`).join(''):`<div class="empty">No shifts this week</div>`;
  return`<div class="card"><div class="sl">Summary</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px"><div class="met"><div class="ml">Today</div><div style="font-size:15px;font-weight:700">${fHM(totMs(td))}</div></div><div class="met"><div class="ml">This week</div><div style="font-size:15px;font-weight:700">${fHM(totMs(wk))}</div></div><div class="met"><div class="ml">All time</div><div style="font-size:15px;font-weight:700">${fHM(totMs(al))}</div></div></div></div><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem"><div class="sl" style="margin:0">This week</div><span style="font-size:14px;font-weight:700;color:var(--green)">${fHM(totMs(wk))}</span></div>${wr}</div>`;
}
window.appCheckLoc=function(){
  const btn=$('loc-btn');if(btn){btn.disabled=true;btn.innerHTML=sp('Getting location...');}
  const as=getAS(S.cgp?.id),cl=as?getCL(as.clientId):null;
  if(!cl?.lat){S.lChk=true;S.lOk=false;render();return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{const d=dFt(pos.coords.latitude,pos.coords.longitude,cl.lat,cl.lng);const maxFt=cl.radiusFt||100;S.lChk=true;S.lDist=d;S.lOk=d<=maxFt;S.lErr=null;render();},
    err=>{S.lChk=true;S.lOk=false;S.lDist=null;S.lErr=err.code===1?'Permission denied.':'Could not get location.';render();},
    {enableHighAccuracy:true,timeout:12000,maximumAge:30000}
  );
};
window.appClock=async function(){
  const cg=S.cgp;
  if(S.cIn){await fsSet('sessions',S.cSid,{outTime:Date.now()});S.cIn=false;S.cTime=null;S.cSid=null;}
  else{const sid=uid();await fsSet('sessions',sid,{cgId:cg.id,inTime:Date.now(),outTime:null,createdAt:Date.now()});S.cIn=true;S.cTime=Date.now();S.cSid=sid;}
  await loadDB();render();
};
function sTick(){clearInterval(S.tick);S.tick=setInterval(()=>{const f=$('cface');if(f)f.textContent=fT(Date.now());const e=$('cel');if(e&&S.cIn&&S.cTime)e.textContent=fEl(Date.now()-S.cTime);},1000);}
window.appLogout=async function(){clearInterval(S.tick);S.isSup=false;S.cIn=false;S.cTime=null;S.lOk=false;S.lChk=false;S.cgp=null;await signOut(auth);};

// ── AUTH LISTENER — DEFINED LAST so all window.appXxx functions exist ──────
let _rdy=false;
onAuthStateChanged(auth,async user=>{
  if(S.isSup&&_rdy)return;
  _rdy=true;
  if(!user){S.view='login';render();return;}
  S.user=user;
  const sup=await fsGet('settings','supervisor');
  if(sup&&sup.email?.toLowerCase()===user.email?.toLowerCase()){S.role='sup';S.isSup=true;await loadDB();S.view='sup';S.stab='dash';render();return;}
  const cgs=await fsQ('caregivers','email','==',user.email?.toLowerCase());
  if(cgs.length){S.role='cg';S.cgp=cgs[0];await loadDB();const op=S.DB.sess.find(s=>s.cgId===cgs[0].id&&!s.outTime);if(op){S.cIn=true;S.cTime=tsMs(op.inTime);S.cSid=op.id;}else{S.cIn=false;S.cTime=null;}S.view='cg';S.ctab='clock';render();return;}
  await signOut(auth);S.view='login';render();
});
</script>
</body>
