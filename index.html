<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Care Clock">
<title>Care Clock</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#1D9E75;--green-l:#EAF3DE;--green-d:#0F6E56;--green-t:#3B6D11;
  --red:#E24B4A;--red-l:#FCEBEB;--red-t:#A32D2D;
  --amber:#EF9F27;--amber-l:#FAEEDA;--amber-t:#854F0B;
  --blue:#378ADD;--blue-l:#E6F1FB;--blue-t:#185FA5;
  --purple:#7F77DD;--purple-l:#EEEDFE;--purple-t:#3C3489;
  --bg:#f5f5f3;--card:#fff;--bdr:rgba(0,0,0,.1);--bdr2:rgba(0,0,0,.18);
  --tx:#1a1a1a;--tx2:#555;--tx3:#999;
  --r:12px;--rs:8px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111;--card:#1e1e1e;--bdr:rgba(255,255,255,.1);--bdr2:rgba(255,255,255,.2);
  --tx:#f0f0f0;--tx2:#aaa;--tx3:#666;
  --green-l:#0a2e1e;--green-t:#5DCAA5;--red-l:#2e0a0a;--red-t:#F09595;
  --amber-l:#2e1e00;--amber-t:#FAC775;--blue-l:#0a1e2e;--blue-t:#85B7EB;
  --purple-l:#1a1840;--purple-t:#AFA9EC;
}}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
#app{max-width:520px;margin:0 auto;padding:1rem;min-height:100vh;}

/* Cards */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem;}
.card-flat{background:var(--bg);border-radius:var(--rs);padding:.875rem;margin-bottom:.75rem;}

/* Typography */
.page-title{font-size:22px;font-weight:700;color:var(--tx);margin-bottom:4px;}
.page-sub{font-size:14px;color:var(--tx2);margin-bottom:1.25rem;}
.sec-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--tx3);margin-bottom:.75rem;}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
.b-green{background:var(--green-l);color:var(--green-t);}
.b-red{background:var(--red-l);color:var(--red-t);}
.b-amber{background:var(--amber-l);color:var(--amber-t);}
.b-blue{background:var(--blue-l);color:var(--blue-t);}
.b-purple{background:var(--purple-l);color:var(--purple-t);}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dg{background:var(--green);animation:pulse 1.5s infinite;}
.dr{background:var(--red);}
.da{background:var(--amber);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Buttons */
.btn{width:100%;padding:12px;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.98);}
.btn-g{background:var(--green);color:#fff;}.btn-g:hover{opacity:.9;}
.btn-r{background:var(--red);color:#fff;}.btn-r:hover{opacity:.9;}
.btn-b{background:var(--blue);color:#fff;}.btn-b:hover{opacity:.9;}
.btn-o{background:transparent;border:1px solid var(--bdr2);color:var(--tx);}
.btn-o:hover{background:var(--bg);}
.btn:disabled{background:var(--bdr);color:var(--tx3);cursor:not-allowed;transform:none;}
.btn-sm{padding:6px 14px;font-size:13px;font-weight:500;border-radius:var(--rs);cursor:pointer;background:transparent;border:1px solid var(--bdr2);color:var(--tx2);}
.btn-sm:hover{background:var(--bg);}
.btn-icon{padding:6px 10px;font-size:13px;border-radius:var(--rs);cursor:pointer;background:transparent;border:1px solid var(--bdr2);color:var(--tx2);}
.btn-del{background:transparent;border:1px solid rgba(226,75,74,.3);color:var(--red-t);padding:8px 14px;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;}

/* Forms */
.fld{margin-bottom:.75rem;}
.fld label{display:block;font-size:13px;font-weight:500;color:var(--tx2);margin-bottom:4px;}
.fld input,.fld select,.fld textarea{width:100%;padding:9px 12px;font-size:14px;border:1px solid var(--bdr2);border-radius:var(--rs);background:var(--card);color:var(--tx);outline:none;transition:border .15s;font-family:inherit;}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(55,138,221,.12);}
.fld input::placeholder,.fld textarea::placeholder{color:var(--tx3);}
.fld textarea{resize:vertical;min-height:70px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.hint{font-size:12px;color:var(--tx3);margin-top:4px;}

/* Divider */
.div{height:1px;background:var(--bdr);margin:.875rem 0;}

/* Nav tabs */
.nav{display:flex;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rs);padding:3px;margin-bottom:1rem;gap:2px;}
.nav-tab{flex:1;padding:7px 4px;font-size:12px;font-weight:500;border-radius:6px;cursor:pointer;border:none;background:transparent;color:var(--tx2);}
.nav-tab.on{background:var(--bg);color:var(--tx);font-weight:700;}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{text-align:left;padding:8px 6px;border-bottom:1px solid var(--bdr);font-weight:600;color:var(--tx3);font-size:11px;text-transform:uppercase;letter-spacing:.04em;}
.tbl td{padding:9px 6px;border-bottom:1px solid var(--bdr);color:var(--tx);}
.tbl tr:last-child td{border-bottom:none;}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}

/* Rows */
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bdr);}
.row:last-child{border-bottom:none;}
.row-label{font-size:14px;color:var(--tx2);}
.row-val{font-size:14px;font-weight:600;color:var(--tx);}
.row-val-g{font-size:14px;font-weight:600;color:var(--green);}

/* Metric grid */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.met{background:var(--bg);border-radius:var(--rs);padding:.875rem;}
.met-l{font-size:11px;color:var(--tx3);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;}
.met-v{font-size:22px;font-weight:700;color:var(--tx);}

/* Avatar */
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.av-g{background:var(--green-l);color:var(--green-t);}
.av-b{background:var(--blue-l);color:var(--blue-t);}
.av-p{background:var(--purple-l);color:var(--purple-t);}

/* Clock display */
.clock-big{font-size:44px;font-weight:300;letter-spacing:-2px;text-align:center;margin:.5rem 0;font-variant-numeric:tabular-nums;color:var(--tx);}
.clock-date{font-size:14px;color:var(--tx2);text-align:center;}
.clock-elapsed{font-size:16px;font-weight:700;color:var(--green);text-align:center;margin-top:4px;font-variant-numeric:tabular-nums;}

/* Geo bar */
.geo{font-size:13px;padding:10px 12px;border-radius:var(--rs);margin-bottom:.75rem;display:flex;align-items:flex-start;gap:8px;line-height:1.4;}
.geo-ok{background:var(--green-l);color:var(--green-t);}
.geo-fail{background:var(--red-l);color:var(--red-t);}
.geo-neu{background:var(--amber-l);color:var(--amber-t);}

/* Misc */
.empty{font-size:14px;color:var(--tx3);text-align:center;padding:2rem 1rem;}
.smsg{font-size:13px;min-height:18px;margin-bottom:.75rem;line-height:1.5;}
.mok{color:var(--green-t);}.merr{color:var(--red-t);}.mneu{color:var(--tx3);}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--bdr);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes sp{to{transform:rotate(360deg)}}
.noti{font-size:12px;color:var(--tx3);text-align:center;margin-top:.5rem;line-height:1.4;}
.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.info-row{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--bdr);}
.info-row:last-child{border-bottom:none;}
.info-key{font-size:12px;color:var(--tx3);min-width:110px;padding-top:2px;}
.info-val{font-size:13px;color:var(--tx);line-height:1.5;}
.wdl{font-size:12px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin:.75rem 0 4px;}
</style>
</head>
<body>
<div id="app"></div>
<script>
const KEY='careclock_v7';
function ld(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}
  return{
    supervisor:{name:'Supervisor',password:'admin1234'},
    caregivers:[],
    clients:[],
    assignments:[],
    sessions:[]
  };
}
function sv(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){}}

let DB=ld();
let S={
  view:'login', // login | supervisor | caregiver
  supTab:'dashboard',
  cgTab:'clock',
  currentCG:null, // logged in caregiver object
  locOk:false,locChecked:false,locDist:null,locErr:null,
  clockedIn:false,clockInTime:null,
  timer:null,
  editCG:null,editCL:null,editAS:null
};

const $=id=>document.getElementById(id);
const uid=()=>Math.random().toString(36).slice(2,9);
function toRad(v){return v*Math.PI/180;}
function distFt(a,b,c,d){const R=3958.8,dL=toRad(c-a),dO=toRad(d-b),x=Math.sin(dL/2)**2+Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dO/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))*5280;}
function fT(ts){return new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function fT2(ts){return new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}
function fD(ts){return new Date(ts).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});}
function fDs(ts){return new Date(ts).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function fEl(ms){const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return`${h}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;}
function fHM(ms){const t=Math.floor(ms/60000),h=Math.floor(t/60),m=t%60;return`${h}h ${m}m`;}
function ini(n){return(n||'?').trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function setMsg(id,html,cls){const e=$(id);if(e){e.className='smsg '+cls;e.innerHTML=html;}}
function cgSessions(cgId){return DB.sessions.filter(s=>s.cgId===cgId);}
function cgTodaySessions(cgId){const t=new Date().toDateString();return DB.sessions.filter(s=>s.cgId===cgId&&new Date(s.inTime).toDateString()===t);}
function cgWeekSessions(cgId){const now=new Date(),d=now.getDay(),st=new Date(now);st.setDate(now.getDate()-d);st.setHours(0,0,0,0);return DB.sessions.filter(s=>s.cgId===cgId&&new Date(s.inTime)>=st);}
function totMs(arr){return arr.reduce((s,x)=>s+(x.outTime-x.inTime),0);}
function getAssignment(cgId){return DB.assignments.find(a=>a.cgId===cgId);}
function getClient(id){return DB.clients.find(c=>c.id===id);}
function getCaregiver(id){return DB.caregivers.find(c=>c.id===id);}

function render(){
  const app=$('app');app.innerHTML='';clearInterval(S.timer);
  if(S.view==='login')app.appendChild(bLogin());
  else if(S.view==='supervisor')app.appendChild(bSupervisor());
  else if(S.view==='caregiver')app.appendChild(bCaregiver());
}

/* ═══════════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════════ */
function bLogin(){
  const w=document.createElement('div');w.style.padding='2rem 0';
  w.innerHTML=`
  <div style="text-align:center;margin-bottom:1.5rem">
    <div style="width:64px;height:64px;border-radius:50%;background:var(--green-l);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:28px">&#128305;</div>
    <div style="font-size:26px;font-weight:700;color:var(--tx)">Care Clock</div>
    <div style="font-size:14px;color:var(--tx2);margin-top:4px">Caregiver time &amp; client management</div>
  </div>
  <div class="card">
    <div class="fld"><label>Username / Employee ID</label><input id="l-user" placeholder="Enter your username" autocomplete="off" autocorrect="off" autocapitalize="off"></div>
    <div class="fld"><label>Password</label><input id="l-pass" type="password" placeholder="Enter your password" autocomplete="off"></div>
    <div id="l-msg" class="smsg merr" style="min-height:16px"></div>
    <button class="btn btn-g" onclick="doLogin()">Sign in</button>
  </div>
  <div style="text-align:center;font-size:12px;color:var(--tx3);margin-top:.5rem">Supervisor default: <strong>admin</strong> / <strong>admin1234</strong></div>`;
  const inp=$('l-pass');if(inp)inp.onkeydown=e=>{if(e.key==='Enter')doLogin();};
  return w;
}

function doLogin(){
  const user=($('l-user').value||'').trim().toLowerCase();
  const pass=($('l-pass').value||'').trim();
  if(!user||!pass){setMsg('l-msg','Please enter username and password.','merr');return;}
  // Check supervisor
  if(user==='admin'||user===DB.supervisor.name.toLowerCase()){
    if(pass===DB.supervisor.password){S.view='supervisor';S.supTab='dashboard';render();return;}
    else{setMsg('l-msg','Incorrect password.','merr');return;}
  }
  // Check caregivers
  const cg=DB.caregivers.find(c=>c.username.toLowerCase()===user);
  if(!cg){setMsg('l-msg','Username not found.','merr');return;}
  if(cg.password!==pass){setMsg('l-msg','Incorrect password.','merr');return;}
  S.currentCG=cg;S.view='caregiver';S.cgTab='clock';
  S.locOk=false;S.locChecked=false;S.locDist=null;S.locErr=null;
  // Restore clock state if clocked in
  const openSession=DB.sessions.find(s=>s.cgId===cg.id&&!s.outTime);
  if(openSession){S.clockedIn=true;S.clockInTime=openSession.inTime;S.openSessionId=openSession.id;}
  else{S.clockedIn=false;S.clockInTime=null;}
  render();
}

/* ═══════════════════════════════════════
   SUPERVISOR PORTAL
═══════════════════════════════════════ */
function bSupervisor(){
  const w=document.createElement('div');
  // Header
  w.innerHTML=`
  <div class="hrow">
    <div>
      <div style="font-size:20px;font-weight:700;color:var(--tx)">Supervisor Portal</div>
      <div style="font-size:13px;color:var(--tx2)">Care Clock Management</div>
    </div>
    <button class="btn-sm" onclick="logout()">Sign out</button>
  </div>
  <div class="nav">
    <button class="nav-tab ${S.supTab==='dashboard'?'on':''}" onclick="supTab('dashboard')">Dashboard</button>
    <button class="nav-tab ${S.supTab==='caregivers'?'on':''}" onclick="supTab('caregivers')">Caregivers</button>
    <button class="nav-tab ${S.supTab==='clients'?'on':''}" onclick="supTab('clients')">Clients</button>
    <button class="nav-tab ${S.supTab==='assignments'?'on':''}" onclick="supTab('assignments')">Assignments</button>
    <button class="nav-tab ${S.supTab==='reports'?'on':''}" onclick="supTab('reports')">Reports</button>
  </div>
  <div id="sup-content"></div>`;
  setTimeout(()=>{
    const c=$('sup-content');if(!c)return;
    if(S.supTab==='dashboard')c.appendChild(bSupDashboard());
    else if(S.supTab==='caregivers')c.appendChild(bSupCaregivers());
    else if(S.supTab==='clients')c.appendChild(bSupClients());
    else if(S.supTab==='assignments')c.appendChild(bSupAssignments());
    else if(S.supTab==='reports')c.appendChild(bSupReports());
  },0);
  return w;
}
function supTab(t){S.supTab=t;S.editCG=null;S.editCL=null;S.editAS=null;render();}

/* Dashboard */
function bSupDashboard(){
  const w=document.createElement('div');
  const todayAll=DB.sessions.filter(s=>new Date(s.inTime).toDateString()===new Date().toDateString()&&s.outTime);
  const activeNow=DB.sessions.filter(s=>!s.outTime);
  w.innerHTML=`
  <div class="mgrid">
    <div class="met"><div class="met-l">Caregivers</div><div class="met-v">${DB.caregivers.length}</div></div>
    <div class="met"><div class="met-l">Clients</div><div class="met-v">${DB.clients.length}</div></div>
    <div class="met"><div class="met-l">Active now</div><div class="met-v" style="color:var(--green)">${activeNow.length}</div></div>
    <div class="met"><div class="met-l">Shifts today</div><div class="met-v">${todayAll.length}</div></div>
  </div>
  <div class="card">
    <div class="sec-label">Currently clocked in</div>
    ${activeNow.length?activeNow.map(s=>{
      const cg=getCaregiver(s.cgId);
      const as=getAssignment(s.cgId);
      const cl=as?getClient(as.clientId):null;
      return`<div class="row">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="av av-g">${ini(cg?.name)}</div>
          <div>
            <div style="font-size:14px;font-weight:600;color:var(--tx)">${cg?.name||'Unknown'}</div>
            <div style="font-size:12px;color:var(--tx2)">${cl?cl.name:'No assignment'}</div>
          </div>
        </div>
        <div>
          <div class="badge b-green"><div class="dot dg"></div>Active</div>
          <div style="font-size:12px;color:var(--tx3);text-align:right;margin-top:2px">since ${fT2(s.inTime)}</div>
        </div>
      </div>`;}).join(''):`<div class="empty">No one is currently clocked in</div>`}
  </div>
  <div class="card">
    <div class="sec-label">Quick actions</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <button class="btn btn-o" onclick="supTab('caregivers')">+ Add caregiver</button>
      <button class="btn btn-o" onclick="supTab('clients')">+ Add client</button>
      <button class="btn btn-o" onclick="supTab('assignments')">+ New assignment</button>
      <button class="btn btn-o" onclick="supTab('reports')">View reports</button>
    </div>
  </div>
  <div class="card">
    <div class="sec-label">Supervisor settings</div>
    <div class="fld"><label>Change supervisor password</label><input id="sup-pw" type="password" placeholder="New password" autocomplete="off"></div>
    <div id="sup-pw-msg" class="smsg mneu" style="min-height:14px"></div>
    <button class="btn btn-o" onclick="changeSupPass()">Update password</button>
  </div>`;
  return w;
}

function changeSupPass(){
  const p=($('sup-pw').value||'').trim();
  if(!p||p.length<4){setMsg('sup-pw-msg','Password must be at least 4 characters.','merr');return;}
  DB.supervisor.password=p;sv(DB);
  setMsg('sup-pw-msg','Password updated!','mok');
  $('sup-pw').value='';
}

/* Caregivers */
function bSupCaregivers(){
  const w=document.createElement('div');
  const editing=S.editCG;
  w.innerHTML=`
  <div class="card">
    <div class="sec-label">${editing?'Edit caregiver':'Add new caregiver'}</div>
    <div class="frow">
      <div class="fld"><label>Full name</label><input id="cg-name" value="${editing?.name||''}" placeholder="Full name" autocomplete="off"></div>
      <div class="fld"><label>Phone</label><input id="cg-phone" value="${editing?.phone||''}" placeholder="Phone number" autocomplete="off"></div>
    </div>
    <div class="frow">
      <div class="fld"><label>Username</label><input id="cg-user" value="${editing?.username||''}" placeholder="Login username" autocorrect="off" autocapitalize="off" autocomplete="off"></div>
      <div class="fld"><label>Password</label><input id="cg-pass" value="${editing?.password||''}" placeholder="Login password" autocomplete="off"></div>
    </div>
    <div class="fld"><label>Email (optional)</label><input id="cg-email" value="${editing?.email||''}" placeholder="Email address" autocomplete="off"></div>
    <div id="cg-msg" class="smsg mneu"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-g" onclick="saveCG()">${editing?'Save changes':'Add caregiver'}</button>
      ${editing?`<button class="btn btn-o" onclick="S.editCG=null;render()">Cancel</button>`:''}
    </div>
  </div>
  <div class="card">
    <div class="sec-label">All caregivers (${DB.caregivers.length})</div>
    ${DB.caregivers.length?DB.caregivers.map(cg=>{
      const as=getAssignment(cg.id);
      const cl=as?getClient(as.clientId):null;
      const todayMs=totMs(cgTodaySessions(cg.id));
      return`<div class="row">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="av av-g">${ini(cg.name)}</div>
          <div>
            <div style="font-size:14px;font-weight:600;color:var(--tx)">${cg.name}</div>
            <div style="font-size:12px;color:var(--tx2)">@${cg.username} &bull; ${cl?cl.name:'No assignment'}</div>
            <div style="font-size:12px;color:var(--tx3)">Today: ${fHM(todayMs)}</div>
          </div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn-icon" onclick="editCG('${cg.id}')">&#9998;</button>
          <button class="btn-icon" style="color:var(--red-t)" onclick="deleteCG('${cg.id}')">&#128465;</button>
        </div>
      </div>`;}).join(''):`<div class="empty">No caregivers added yet</div>`}
  </div>`;
  return w;
}

function saveCG(){

function pinClientLocation(){
  const btn=$('cl-pin-btn'),st=$('cl-pin-status');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>Getting GPS...';}
  navigator.geolocation.getCurrentPosition(pos=>{
    window._clLat=pos.coords.latitude;window._clLng=pos.coords.longitude;
    if(st){st.textContent=`${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;}
    if(btn){btn.disabled=false;btn.innerHTML='&#x2713; Pinned! Tap to update';}
  },err=>{
    if(st){st.style.color='var(--red-t)';st.textContent=err.code===1?'Permission denied.':'Could not get location.';}
    if(btn){btn.disabled=false;btn.innerHTML='&#x1F4CD; Pin location now';}
  },{enableHighAccuracy:true,timeout:12000,maximumAge:0});
}

function exportAllCSV(){
  const hdr=['Caregiver','Client','Date','Clock In','Clock Out','Duration (hrs)','Duration (min)'];
  const rows=[];
  DB.sessions.filter(s=>s.outTime).forEach(s=>{
    const cg=getCaregiver(s.cgId);
    const as=getAssignment(s.cgId);
    const cl=as?getClient(as.clientId):null;
    const ms=s.outTime-s.inTime;
    rows.push([cg?.name||'',cl?.name||'',fDs(s.inTime),fT2(s.inTime),fT2(s.outTime),(ms/3600000).toFixed(2),Math.round(ms/60000)]);
  });
  const csv=[hdr,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='care_clock_report.csv';a.click();URL.revokeObjectURL(url);
}

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
      <div class="sec-label" style="margin:0">This week</div>
      <span style="font-size:14px;font-weight:700;color:var(--green)">${fHM(weekTotal)}</span>
    </div>
    ${weekRows}
  </div>`;
  return w;
}

/* ── CLOCK IN / OUT ── */
function checkGeo(){
  const btn=$('geo-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>Getting location...';}
  const as=getAssignment(S.currentCG?.id);
  const cl=as?getClient(as.clientId):null;
  if(!cl?.lat){S.locChecked=true;S.locOk=false;S.locErr='No location set for this client.';render();return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const d=distFt(pos.coords.latitude,pos.coords.longitude,cl.lat,cl.lng);
      S.locChecked=true;S.locDist=d;S.locOk=d<=100;S.locErr=null;render();
    },
    err=>{
      S.locChecked=true;S.locOk=false;S.locDist=null;
      S.locErr=err.code===1?'Location permission denied.':'Could not get location. Try again.';
      render();
    },
    {enableHighAccuracy:true,timeout:12000,maximumAge:30000}
  );
}

function doClock(){
  const cg=S.currentCG;
  if(S.clockedIn){
    // Clock out
    const i=DB.sessions.findIndex(s=>s.id===S.openSessionId);
    if(i>=0)DB.sessions[i].outTime=Date.now();
    sv(DB);S.clockedIn=false;S.clockInTime=null;S.openSessionId=null;
  } else {
    // Clock in
    const session={id:uid(),cgId:cg.id,inTime:Date.now(),outTime:null};
    DB.sessions.push(session);sv(DB);
    S.clockedIn=true;S.clockInTime=session.inTime;S.openSessionId=session.id;
  }
  render();
}

function startTick(){
  clearInterval(S.timer);
  S.timer=setInterval(()=>{
    const cf=$('cf');if(cf)cf.textContent=fT(Date.now());
    const ed=$('eld');if(ed&&S.clockedIn&&S.clockInTime)ed.textContent=fEl(Date.now()-S.clockInTime);
  },1000);
}

function logout(){
  clearInterval(S.timer);
  S.view='login';S.currentCG=null;S.clockedIn=false;S.clockInTime=null;
  S.locOk=false;S.locChecked=false;S.locDist=null;
  render();
}

render();
</script>
