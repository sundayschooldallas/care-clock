<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Care Clock">
<title>Care Clock</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#1D9E75;--green-l:#EAF3DE;--green-t:#3B6D11;
  --red:#E24B4A;--red-l:#FCEBEB;--red-t:#A32D2D;
  --amber:#EF9F27;--amber-l:#FAEEDA;--amber-t:#854F0B;
  --blue:#378ADD;--blue-l:#E6F1FB;--blue-t:#185FA5;
  --bg:#f5f5f3;--card:#fff;--bdr:rgba(0,0,0,.1);--bdr2:rgba(0,0,0,.18);
  --tx:#1a1a1a;--tx2:#555;--tx3:#999;--r:12px;--rs:8px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111;--card:#1e1e1e;--bdr:rgba(255,255,255,.1);--bdr2:rgba(255,255,255,.2);
  --tx:#f0f0f0;--tx2:#aaa;--tx3:#666;
  --green-l:#0a2e1e;--green-t:#5DCAA5;--red-l:#2e0a0a;--red-t:#F09595;
  --amber-l:#2e1e00;--amber-t:#FAC775;--blue-l:#0a1e2e;--blue-t:#85B7EB;
}}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
#root{max-width:520px;margin:0 auto;padding:1rem;min-height:100vh;}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem;}
.slabel{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--tx3);margin-bottom:.75rem;}
.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.av-g{background:var(--green-l);color:var(--green-t);}
.av-b{background:var(--blue-l);color:var(--blue-t);}
.nav{display:flex;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rs);padding:3px;margin-bottom:1rem;gap:2px;}
.ntab{flex:1;padding:7px 2px;font-size:12px;font-weight:500;border-radius:6px;cursor:pointer;border:none;background:transparent;color:var(--tx2);}
.ntab.on{background:var(--bg);color:var(--tx);font-weight:700;}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
.b-g{background:var(--green-l);color:var(--green-t);}
.b-r{background:var(--red-l);color:var(--red-t);}
.b-b{background:var(--blue-l);color:var(--blue-t);}
.b-a{background:var(--amber-l);color:var(--amber-t);}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dg{background:var(--green);animation:pulse 1.5s infinite;}
.dr{background:var(--red);}
.da{background:var(--amber);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn{width:100%;padding:12px;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.98);}
.btn-g{background:var(--green);color:#fff;}
.btn-r{background:var(--red);color:#fff;}
.btn-b{background:var(--blue);color:#fff;}
.btn-o{background:transparent;border:1px solid var(--bdr2);color:var(--tx);}
.btn:disabled{background:var(--bdr);color:var(--tx3);cursor:not-allowed;transform:none;}
.bsm{padding:6px 12px;font-size:12px;font-weight:500;border-radius:var(--rs);cursor:pointer;background:transparent;border:1px solid var(--bdr2);color:var(--tx2);}
.bicon{padding:6px 10px;font-size:13px;border-radius:var(--rs);cursor:pointer;background:transparent;border:1px solid var(--bdr2);color:var(--tx2);}
.fld{margin-bottom:.75rem;}
.fld label{display:block;font-size:13px;font-weight:500;color:var(--tx2);margin-bottom:4px;}
.fld input,.fld select,.fld textarea{width:100%;padding:9px 12px;font-size:14px;border:1px solid var(--bdr2);border-radius:var(--rs);background:var(--card);color:var(--tx);outline:none;font-family:inherit;}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(55,138,221,.12);}
.fld input::placeholder,.fld textarea::placeholder{color:var(--tx3);}
.fld textarea{resize:vertical;min-height:70px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.hint{font-size:12px;color:var(--tx3);margin-top:4px;line-height:1.4;}
.div{height:1px;background:var(--bdr);margin:.875rem 0;}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.met{background:var(--bg);border-radius:var(--rs);padding:.875rem;}
.ml{font-size:11px;color:var(--tx3);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;}
.mv{font-size:20px;font-weight:700;color:var(--tx);}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bdr);}
.row:last-child{border-bottom:none;}
.cbig{font-size:44px;font-weight:300;letter-spacing:-2px;text-align:center;margin:.5rem 0;font-variant-numeric:tabular-nums;}
.cdate{font-size:14px;color:var(--tx2);text-align:center;}
.cel{font-size:16px;font-weight:700;color:var(--green);text-align:center;margin-top:4px;font-variant-numeric:tabular-nums;}
.geo{font-size:13px;padding:10px 12px;border-radius:var(--rs);margin-bottom:.75rem;display:flex;align-items:flex-start;gap:8px;line-height:1.5;}
.geo-ok{background:var(--green-l);color:var(--green-t);}
.geo-fail{background:var(--red-l);color:var(--red-t);}
.geo-neu{background:var(--amber-l);color:var(--amber-t);}
.irow{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--bdr);}
.irow:last-child{border-bottom:none;}
.ikey{font-size:12px;color:var(--tx3);min-width:120px;font-weight:500;}
.ival{font-size:13px;color:var(--tx);line-height:1.5;}
.empty{font-size:14px;color:var(--tx3);text-align:center;padding:2rem 1rem;}
.msg{font-size:13px;min-height:18px;margin-bottom:.75rem;line-height:1.5;}
.mok{color:var(--green-t);}.merr{color:var(--red-t);}.mneu{color:var(--tx3);}
.spin{display:inline-block;width:12px;height:12px;border:2px solid var(--bdr);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:5px;}
@keyframes sp{to{transform:rotate(360deg)}}
.noti{font-size:12px;color:var(--tx3);text-align:center;margin-top:.5rem;line-height:1.4;}
.wdl{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin:.75rem 0 4px;}
.screen-load{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:.75rem;}
.lock-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;background:var(--red-l);color:var(--red-t);padding:2px 7px;border-radius:20px;margin-left:5px;vertical-align:middle;}
</style>
</head>
<body>
<div id="root"><div class="screen-load"><div class="spin" style="width:24px;height:24px;border-width:3px"></div><p style="color:var(--tx2);font-size:14px">Loading Care Clock...</p></div></div>

<script type="module">
// ── FIREBASE ──
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,signOut,onAuthStateChanged,sendPasswordResetEmail,updatePassword}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,doc,setDoc,getDoc,getDocs,collection,addDoc,deleteDoc,query,where}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const W={}; // global action namespace

const FB={
  apiKey:"AIzaSyD4JelsMu_NGt3lo9pOYtGgHW0msoUzuQ4",
  authDomain:"care-clock-2adcd.firebaseapp.com",
  projectId:"care-clock-2adcd",
  storageBucket:"care-clock-2adcd.firebasestorage.app",
  messagingSenderId:"345647037416",
  appId:"1:345647037416:web:f68c4f541ebf995ca7025d"
};
const app=initializeApp(FB);
const auth=getAuth(app);
const db=getFirestore(app);

// ── DB HELPERS ──
const fsGet=async(c,i)=>{const d=await getDoc(doc(db,c,i));return d.exists()?{id:d.id,...d.data()}:null;};
const fsSet=async(c,i,d)=>setDoc(doc(db,c,i),d,{merge:true});
const fsAdd=async(c,d)=>{const r=await addDoc(collection(db,c),d);return r.id;};
const fsDel=async(c,i)=>deleteDoc(doc(db,c,i));
const fsAll=async(c)=>{const s=await getDocs(collection(db,c));return s.docs.map(d=>({id:d.id,...d.data()}));};
const fsWhere=async(c,f,op,v)=>{const q=query(collection(db,c),where(f,op,v));const s=await getDocs(q);return s.docs.map(d=>({id:d.id,...d.data()}));};

// ── STATE ──
let st={
  view:'loading', // loading|login|sup|cg
  supTab:'dash', cgTab:'clock',
  user:null, role:null, cgProfile:null,
  isSup:false,
  editCG:null, editCL:null, editAS:null,
  locOk:false, locChecked:false, locDist:null, locErr:null,
  clockedIn:false, clockInTime:null, openSid:null,
  tick:null,
  DB:{cgs:[], cls:[], ass:[], sess:[]}
};

// ── UTILS ──
const R=id=>document.getElementById(id);
const ini=n=>(n||'?').trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const uid=()=>Math.random().toString(36).slice(2,9);
const lkKey=e=>btoa(e).replace(/[^a-zA-Z0-9]/g,'').slice(0,40);
const toRad=v=>v*Math.PI/180;
const distFt=(a,b,c,d)=>{const R=3958.8,dL=toRad(c-a),dO=toRad(d-b),x=Math.sin(dL/2)**2+Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dO/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))*5280;};
const fT=ts=>new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
const fT2=ts=>new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
const fD=ts=>new Date(ts).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
const fDs=ts=>new Date(ts).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
const fEl=ms=>{const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return`${h}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;};
const fHM=ms=>{const t=Math.floor(ms/60000),h=Math.floor(t/60),m=t%60;return`${h}h ${m}m`;};
const tsMs=ts=>{if(!ts)return 0;if(typeof ts==='number')return ts;if(ts.toMillis)return ts.toMillis();if(ts.seconds)return ts.seconds*1000;return new Date(ts).getTime();};
const setMsg=(id,html,cls)=>{const e=R(id);if(e){e.className='msg '+cls;e.innerHTML=html;}};
const spin=(msg='Saving...')=>`<span class="spin"></span>${msg}`;
const getCG=id=>st.DB.cgs.find(c=>c.id===id);
const getCL=id=>st.DB.cls.find(c=>c.id===id);
const getAS=cgId=>st.DB.ass.find(a=>a.cgId===cgId);
const todaySess=cgId=>{const t=new Date().toDateString();return st.DB.sess.filter(s=>s.cgId===cgId&&s.outTime&&new Date(tsMs(s.inTime)).toDateString()===t);};
const weekSess=cgId=>{const now=new Date(),d=now.getDay(),s=new Date(now);s.setDate(now.getDate()-d);s.setHours(0,0,0,0);return st.DB.sess.filter(s=>s.cgId===cgId&&s.outTime&&new Date(tsMs(s.inTime))>=s);};
const allSess=cgId=>st.DB.sess.filter(s=>s.cgId===cgId&&s.outTime);
const totMs=arr=>arr.reduce((s,x)=>s+(tsMs(x.outTime)-tsMs(x.inTime)),0);

async function loadDB(){
  const[cgs,cls,ass,sess]=await Promise.all([fsAll('caregivers'),fsAll('clients'),fsAll('assignments'),fsAll('sessions')]);
  st.DB={cgs,cls,ass,sess};
}

// ── LOCKOUT ──
async function isLocked(email){
  const l=await fsGet('lockouts',lkKey(email));
  return l?.locked===true;
}
async function recordFail(email){
  const k=lkKey(email);
  const l=await fsGet('lockouts',k)||{attempts:0};
  const attempts=(l.attempts||0)+1;
  const locked=attempts>=2;
  await fsSet('lockouts',k,{email,attempts,locked,updatedAt:Date.now()});
  return{attempts,locked};
}
async function clearLock(email){
  try{await fsDel('lockouts',lkKey(email));}catch(e){}
}

// ── AUTH LISTENER ──
// We use a flag to prevent re-entry when supervisor adds caregivers
let _authReady=false;
onAuthStateChanged(auth,async user=>{
  if(st.isSup&&_authReady)return; // supervisor session - ignore auth changes
  _authReady=true;
  if(!user){st.view='login';render();return;}
  st.user=user;
  // Check supervisor
  const sup=await fsGet('settings','supervisor');
  if(sup&&sup.email.toLowerCase()===user.email.toLowerCase()){
    st.role='sup';st.isSup=true;
    await loadDB();
    st.view='sup';st.supTab='dash';
    render();return;
  }
  // Check caregiver
  const cgs=await fsWhere('caregivers','email','==',user.email.toLowerCase());
  if(cgs.length){
    st.role='cg';st.cgProfile=cgs[0];
    await loadDB();
    const open=st.DB.sess.find(s=>s.cgId===cgs[0].id&&!s.outTime);
    if(open){st.clockedIn=true;st.clockInTime=tsMs(open.inTime);st.openSid=open.id;}
    else{st.clockedIn=false;st.clockInTime=null;}
    st.view='cg';st.cgTab='clock';
    render();return;
  }
  // Unknown user - sign out
  await signOut(auth);
  st.view='login';render();
});

// ── RENDER ──
function render(){
  clearInterval(st.tick);
  const root=R('root');
  if(st.view==='loading'){root.innerHTML=`<div class="screen-load"><div class="spin" style="width:24px;height:24px;border-width:3px"></div><p style="color:var(--tx2);font-size:14px">Loading...</p></div>`;return;}
  if(st.view==='login'){root.innerHTML=buildLogin();attachLogin();return;}
  if(st.view==='sup'){root.innerHTML=buildSup();return;}
  if(st.view==='cg'){root.innerHTML=buildCG();if(st.cgTab==='clock')startTick();}
}

// ════════════ LOGIN ════════════
function buildLogin(){
  return`<div style="padding:2rem 0">
  <div style="text-align:center;margin-bottom:1.5rem">
    <div style="width:60px;height:60px;border-radius:50%;background:var(--green-l);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:26px">&#128305;</div>
    <div style="font-size:24px;font-weight:700">Care Clock</div>
    <div style="font-size:13px;color:var(--tx2);margin-top:4px">Secure caregiver management</div>
  </div>
  <div class="card">
    <div class="fld"><label>Email address</label><input id="l-em" type="email" placeholder="your@email.com" autocomplete="email"></div>
    <div class="fld"><label>Password</label><input id="l-pw" type="password" placeholder="Password" autocomplete="current-password"></div>
    <div id="l-msg" class="msg merr" style="min-height:16px"></div>
    <button class="btn btn-g" id="l-btn" onclick="W.login()">Sign in</button>
  </div>
  <div id="sup-setup-wrap">
    <p style="text-align:center;font-size:12px;color:var(--tx3);margin:.75rem 0">First time? Create your supervisor account below.</p>
    <div class="card" style="border-style:dashed">
      <div style="font-size:13px;font-weight:600;margin-bottom:.75rem">&#128274; First-time supervisor setup</div>
      <div class="fld"><label>Your email</label><input id="s-em" type="email" placeholder="supervisor@email.com"></div>
      <div class="fld"><label>Password (min 6 chars)</label><input id="s-pw" type="password" placeholder="Create password"></div>
      <div id="s-msg" class="msg mneu" style="min-height:16px"></div>
      <button class="btn btn-b" onclick="W.setupSup()">Create supervisor account</button>
    </div>
  </div>
</div>`;
}

function attachLogin(){
  fsGet('settings','supervisor').then(s=>{const w=R('sup-setup-wrap');if(s&&w)w.style.display='none';});
  const p=R('l-pw');if(p)p.onkeydown=e=>{if(e.key==='Enter')W.login();};
}

W.login=async function(){
  const em=(R('l-em').value||'').trim().toLowerCase();
  const pw=(R('l-pw').value||'').trim();
  if(!em||!pw){setMsg('l-msg','Please enter email and password.','merr');return;}
  const btn=R('l-btn');btn.disabled=true;btn.innerHTML=spin('Signing in...');

  // Check supervisor
  const sup=await fsGet('settings','supervisor');
  const isSup=sup&&sup.email.toLowerCase()===em;

  // Lockout check (not for supervisor)
  if(!isSup){
    const locked=await isLocked(em);
    if(locked){
      setMsg('l-msg','&#x1F512; This account is locked. Contact your supervisor to unlock.','merr');
      btn.disabled=false;btn.innerHTML='Sign in';return;
    }
  }

  // For caregivers: check Firestore first
  if(!isSup){
    const cgs=await fsWhere('caregivers','email','==',em);
    if(!cgs.length){setMsg('l-msg','No account found with that email.','merr');btn.disabled=false;btn.innerHTML='Sign in';return;}
    const cg=cgs[0];
    // Try Firebase Auth sign-in
    try{
      await signInWithEmailAndPassword(auth,em,pw);
      await clearLock(em);
      return; // onAuthStateChanged handles the rest
    }catch(authErr){
      // If no Firebase Auth account yet, try tempPass
      if(authErr.code==='auth/user-not-found'||authErr.code==='auth/invalid-credential'||authErr.code==='auth/invalid-login-credentials'){
        if(cg.tempPass===pw){
          // Create Firebase Auth account
          try{
            await createUserWithEmailAndPassword(auth,em,pw);
            await clearLock(em);
            return;
          }catch(ce){
            if(ce.code==='auth/email-already-in-use'){
              // Account exists, try signing in again
              try{await signInWithEmailAndPassword(auth,em,pw);await clearLock(em);return;}catch(e2){}
            }
          }
        }
      }
      // Wrong password
      const r=await recordFail(em);
      if(r.locked){setMsg('l-msg','&#x1F512; Account locked after 2 failed attempts. Contact your supervisor.','merr');}
      else{setMsg('l-msg',`Incorrect password. ${2-r.attempts} attempt(s) left before account is locked.`,'merr');}
      btn.disabled=false;btn.innerHTML='Sign in';return;
    }
  }

  // Supervisor login
  try{await signInWithEmailAndPassword(auth,em,pw);}
  catch(e){
    setMsg('l-msg',e.code==='auth/too-many-requests'?'Too many attempts. Try again later.':'Incorrect password.','merr');
    btn.disabled=false;btn.innerHTML='Sign in';
  }
};

W.setupSup=async function(){
  const em=(R('s-em').value||'').trim().toLowerCase();
  const pw=(R('s-pw').value||'').trim();
  if(!em||!pw){setMsg('s-msg','Please fill in both fields.','merr');return;}
  if(pw.length<6){setMsg('s-msg','Password must be at least 6 characters.','merr');return;}
  setMsg('s-msg',spin('Creating account...'),'mneu');
  try{
    await createUserWithEmailAndPassword(auth,em,pw);
    await fsSet('settings','supervisor',{email:em,createdAt:Date.now()});
  }catch(e){
    setMsg('s-msg',e.code==='auth/email-already-in-use'?'Account exists. Sign in above.':'Error: '+e.message,'merr');
  }
};

// ════════════ SUPERVISOR ════════════
function buildSup(){
  const tabs=[['dash','Dashboard'],['cgs','Caregivers'],['cls','Clients'],['ass','Assign'],['rep','Reports']];
  const nav=tabs.map(([t,l])=>`<button class="ntab ${st.supTab===t?'on':''}" onclick="W.supTab('${t}')">${l}</button>`).join('');
  let body='';
  if(st.supTab==='dash') body=buildDash();
  else if(st.supTab==='cgs') body=buildCGs();
  else if(st.supTab==='cls') body=buildCLs();
  else if(st.supTab==='ass') body=buildASS();
  else if(st.supTab==='rep') body=buildRep();
  return`
  <div class="hrow">
    <div><div style="font-size:19px;font-weight:700">Supervisor Portal</div><div style="font-size:12px;color:var(--tx2)">Care Clock</div></div>
    <button class="bsm" onclick="W.logout()">Sign out</button>
  </div>
  <div class="nav">${nav}</div>
  ${body}`;
}

W.supTab=function(t){st.supTab=t;st.editCG=null;st.editCL=null;st.editAS=null;render();};

// Dashboard
function buildDash(){
  const active=st.DB.sess.filter(s=>!s.outTime);
  const today=st.DB.sess.filter(s=>s.outTime&&new Date(tsMs(s.inTime)).toDateString()===new Date().toDateString());
  const activeRows=active.length?active.map(s=>{
    const cg=getCG(s.cgId),as=getAS(s.cgId),cl=as?getCL(as.clientId):null;
    return`<div class="row"><div style="display:flex;align-items:center;gap:10px"><div class="av av-g">${ini(cg?.name)}</div><div><div style="font-size:14px;font-weight:600">${cg?.name||'?'}</div><div style="font-size:12px;color:var(--tx2)">${cl?.name||'No client'} &bull; since ${fT2(tsMs(s.inTime))}</div></div></div><div class="badge b-g"><div class="dot dg"></div>Active</div></div>`;
  }).join(''):`<div class="empty">No one clocked in right now</div>`;
  return`
  <div class="mgrid">

W.saveCG=async function(){
  const name=(R('cg-n').value||'').trim();
  const phone=(R('cg-ph').value||'').trim();
  const email=(R('cg-em').value||'').trim().toLowerCase();
  const pw=(R('cg-pw').value||'').trim();
  if(!name||!email){setMsg('cg-msg','Name and email are required.','merr');return;}
  if(!st.editCG&&(!pw||pw.length<6)){setMsg('cg-msg','Password must be at least 6 characters.','merr');return;}
  if(!st.editCG){
    if(st.DB.cgs.find(c=>c.email.toLowerCase()===email)){setMsg('cg-msg','A caregiver with that email already exists.','merr');return;}
    if(st.DB.cgs.find(c=>c.tempPass===pw)){setMsg('cg-msg','That password is already used by another caregiver. Please choose a unique password.','merr');return;}
  }
  if(pw&&pw.length>0&&pw.length<6){setMsg('cg-msg','Password must be at least 6 characters.','merr');return;}
  if(pw&&pw.length>=6&&st.editCG){
    if(st.DB.cgs.find(c=>c.tempPass===pw&&c.id!==st.editCG.id)){setMsg('cg-msg','That password is already used by another caregiver.','merr');return;}
  }
  setMsg('cg-msg',spin('Saving...'),'mneu');
  try{
    if(st.editCG){
      const upd={name,phone,updatedAt:Date.now()};
      if(pw&&pw.length>=6)upd.tempPass=pw;
      await fsSet('caregivers',st.editCG.id,upd);
      st.editCG=null;
    }else{
      await fsSet('caregivers',uid(),{name,email,phone,tempPass:pw,createdAt:Date.now()});
    }
    await loadDB();render();
  }catch(e){setMsg('cg-msg','Error: '+e.message,'merr');}
};

  await fsDel('caregivers',id);await loadDB();render();

W.geocodeCL=async function(){
  const street=(R('cl-st').value||'').trim(),city=(R('cl-cy').value||'').trim(),state=(R('cl-sta').value||'').trim(),zip=(R('cl-zip').value||'').trim();
  if(!street||!city||!state){const s=R('cl-geo-st');if(s){s.style.color='var(--red-t)';s.textContent='Fill in street, city and state first.';}return;}
  const btn=R('cl-geo-btn'),gs=R('cl-geo-st');
  btn.disabled=true;btn.innerHTML=spin('Looking up...');
  if(gs){gs.style.color='var(--tx3)';gs.textContent='Searching...';}
  const queries=[`${street}, ${city}, ${state} ${zip}`.trim(),`${street}, ${city}, ${state}`];
  for(const q of queries){
    try{
      const url=`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1&countrycodes=us`;
      const r=await fetch(url,{headers:{'Accept-Language':'en-US'}});
      const j=await r.json();
      if(j&&j.length){
        window._clLat=parseFloat(j[0].lat);window._clLng=parseFloat(j[0].lon);
        if(gs){gs.style.color='var(--green-t)';gs.innerHTML=`&#x2713; Found: ${window._clLat.toFixed(5)}, ${window._clLng.toFixed(5)}`;}
        btn.disabled=false;btn.innerHTML='&#x2713; GPS set! Tap to refresh';
        return;
      }
    }catch(e){}
  }
  if(gs){gs.style.color='var(--red-t)';gs.textContent='Address not found. Check the fields and try again.';}
  btn.disabled=false;btn.innerHTML='&#x1F4CD; Look up GPS from address';
};
W.saveCL=async function(){
  const fn=(R('cl-fn').value||'').trim(),ln=(R('cl-ln').value||'').trim();
  const street=(R('cl-st').value||'').trim(),city=(R('cl-cy').value||'').trim(),state=(R('cl-sta').value||'').trim().toUpperCase(),zip=(R('cl-zip').value||'').trim();
  if(!fn||!ln){setMsg('cl-msg','First and last name are required.','merr');return;}
  if(!street||!city||!state){setMsg('cl-msg','Street, city and state are required.','merr');return;}
  if(!window._clLat){setMsg('cl-msg','Please look up the GPS location first.','merr');return;}
  const apt=(R('cl-apt').value||'').trim();
  const addr=[street,apt,city,state,zip].filter(Boolean).join(', ');
  const data={name:fn+' '+ln,firstName:fn,lastName:ln,street,apt,city,state,zip,address:addr,
    startDate:R('cl-sd').value||'',endDate:R('cl-ed').value||'',schedule:R('cl-sc').value||'',
    ecFirstName:R('cl-ecfn').value||'',ecLastName:R('cl-ecln').value||'',
    ecName:(R('cl-ecfn').value||'')+' '+(R('cl-ecln').value||''),
    ecPhone:R('cl-ecp').value||'',ecRel:R('cl-ecr').value||'',ecEmail:R('cl-ecem').value||'',
    notes:R('cl-nt').value||'',lat:window._clLat,lng:window._clLng,updatedAt:Date.now()};
  setMsg('cl-msg',spin('Saving...'),'mneu');
  try{
    if(st.editCL){await fsSet('clients',st.editCL.id,data);st.editCL=null;}
    else{data.createdAt=Date.now();await fsAdd('clients',data);}
    await loadDB();render();

};

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:.75rem">
        <div class="met"><div class="ml">Today</div><div style="font-size:14px;font-weight:700">${fHM(td)}</div></div>
        <div class="met"><div class="ml">This week</div><div style="font-size:14px;font-weight:700">${fHM(wk)}</div></div>
        <div class="met"><div class="ml">All time</div><div style="font-size:14px;font-weight:700">${fHM(al)}</div></div>
      </div>
      ${recent.length?recent.map(s=>`<div class="row"><span style="font-size:13px;color:var(--tx2)">${fDs(tsMs(s.inTime))} ${fT2(tsMs(s.inTime))}&ndash;${fT2(tsMs(s.outTime))}</span><span style="font-size:13px;font-weight:600;color:var(--green)">${fHM(tsMs(s.outTime)-tsMs(s.inTime))}</span></div>`).join(''):''}
    </div>`;
  });}
  html+=`</div>`;return html;
}
W.exportCSV=function(){
  const hdr=['Caregiver','Client','Date','In','Out','Hrs','Min'];
  const rows=st.DB.sess.filter(s=>s.outTime).map(s=>{
    const cg=getCG(s.cgId),as=getAS(s.cgId),cl=as?getCL(as.clientId):null,ms=tsMs(s.outTime)-tsMs(s.inTime);
    return[cg?.name||'',cl?.name||'',fDs(tsMs(s.inTime)),fT2(tsMs(s.inTime)),fT2(tsMs(s.outTime)),(ms/3600000).toFixed(2),Math.round(ms/60000)];
  });
  const csv=[hdr,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='care_clock_report.csv';a.click();
};

// ════════════ CAREGIVER VIEW ════════════
function buildCG(){
  const cg=st.cgProfile,as=getAS(cg.id),cl=as?getCL(as.clientId):null;
  const tabs=[['clock','Clock'],['assignment','Assignment'],['hours','My Hours']];
  const nav=tabs.map(([t,l])=>`<button class="ntab ${st.cgTab===t?'on':''}" onclick="W.cgTab('${t}')">${l}</button>`).join('');
  let body='';
  if(st.cgTab==='clock') body=buildCGClock(cg,cl);
  else if(st.cgTab==='assignment') body=buildCGAssign(cg,as,cl);
  else if(st.cgTab==='hours') body=buildCGHours(cg);
  return`
  <div class="hrow">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="av av-g">${ini(cg.name)}</div>
      <div><div style="font-size:17px;font-weight:700">${cg.name}</div><div style="font-size:12px;color:var(--tx2)">${cl?'Client: '+cl.name:'No assignment'}</div></div>
    </div>
    <button class="bsm" onclick="W.logout()">Sign out</button>
  </div>
  <div class="nav">${nav}</div>
  ${body}`;
}
W.cgTab=function(t){st.cgTab=t;render();};

function buildCGClock(cg,cl){
  const elapsed=st.clockedIn&&st.clockInTime?Date.now()-st.clockInTime:0;
  let geo='';
  if(!cl) geo=`<div class="geo geo-neu"><div class="dot da" style="margin-top:3px"></div><span>No active assignment. Contact your supervisor.</span></div>`;
  else if(!cl.lat) geo=`<div class="geo geo-neu"><div class="dot da" style="margin-top:3px"></div><span>Care location not set. Contact your supervisor.</span></div>`;
  else if(!st.locChecked) geo=`<div class="geo geo-neu"><div class="dot da" style="margin-top:3px"></div><span>Tap below to verify your location.</span></div>`;
  else if(st.locOk) geo=`<div class="geo geo-ok"><div class="dot dg" style="margin-top:3px"></div><span>&#x2713; Within range &mdash; ${Math.round(st.locDist)} ft from ${cl.name}'s address</span></div>`;
  else geo=`<div class="geo geo-fail"><div class="dot dr" style="margin-top:3px"></div><span>${st.locDist!==null?`You are ${Math.round(st.locDist)} ft away. `:''}You must be within 100 ft of ${cl.name}'s address to clock in.</span></div>`;
  const badge=st.clockedIn?`<div class="badge b-g"><div class="dot dg"></div>Clocked in</div>`:`<div class="badge b-r"><div class="dot dr"></div>Clocked out</div>`;
  const canClock=!!(cl?.lat);
  const mainBtn=st.clockedIn?`<button class="btn btn-r" onclick="W.doClock()">Clock out</button>`:
    (canClock&&st.locOk)?`<button class="btn btn-g" onclick="W.doClock()">Clock in</button>`:
    `<button class="btn" disabled>${!canClock?'No assignment':'Must be within 100 ft to clock in'}</button>`;
  return`
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
      ${badge}
      <div class="cel" id="cel" style="${st.clockedIn?'':'display:none'}">${fEl(elapsed)}</div>
    </div>
    <div class="cbig" id="cface">${fT(Date.now())}</div>
    <div class="cdate">${fD(Date.now())}</div>
    <div class="div"></div>
    ${geo}
    ${canClock?`<button class="btn btn-o" style="margin-bottom:.75rem" id="geo-btn" onclick="W.checkGeo()">&#x1F4CD; Verify my location</button>`:''}
    ${mainBtn}
    ${cl?`<div class="noti">Must be within 100 ft of ${[cl.street,cl.city,cl.state].filter(Boolean).join(', ')||cl.address||'care address'}</div>`:''}
  </div>
  <div class="card">
    <div class="slabel">Today</div>
    <div class="mgrid">
      <div class="met"><div class="ml">Shifts</div><div class="mv">${todaySess(cg.id).length}</div></div>
      <div class="met"><div class="ml">Hours</div><div class="mv">${fHM(totMs(todaySess(cg.id)))}</div></div>
    </div>
  </div>`;
}

function buildCGAssign(cg,as,cl){
  if(!as||!cl)return`<div class="card"><div class="empty">No active assignment.<br>Contact your supervisor.</div></div>`;
  return`
  <div class="card">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:1rem">
      <div class="av av-b" style="width:48px;height:48px;font-size:16px">${ini(cl.name)}</div>
      <div><div style="font-size:18px;font-weight:700">${cl.name}</div><div class="badge b-g" style="margin-top:4px">Active assignment</div></div>
    </div>
    <div class="div"></div>
    <div class="slabel">Client information</div>
    <div class="irow"><div class="ikey">Street</div><div class="ival">${[cl.street,cl.apt].filter(Boolean).join(', ')||'Not set'}</div></div>
    <div class="irow"><div class="ikey">City/State/ZIP</div><div class="ival">${[cl.city,cl.state,cl.zip].filter(Boolean).join(', ')||'-'}</div></div>
    <div class="irow"><div class="ikey">Work days</div><div class="ival">${as.workDays||cl.schedule||'Not specified'}</div></div>
    <div class="irow"><div class="ikey">Shift hours</div><div class="ival">${as.shiftStart&&as.shiftEnd?as.shiftStart+' – '+as.shiftEnd:'Not set'}</div></div>
    <div class="irow"><div class="ikey">Min hours/day</div><div class="ival">${as.minHours?as.minHours+'h minimum':'Not set'}</div></div>
    <div class="irow"><div class="ikey">Assignment start</div><div class="ival">${as.startDate||'Not set'}</div></div>
    <div class="irow"><div class="ikey">Assignment end</div><div class="ival">${as.endDate||'Ongoing'}</div></div>
    ${cl.notes?`<div class="irow"><div class="ikey">Care notes</div><div class="ival">${cl.notes}</div></div>`:''}
  </div>
  <div class="card">
    <div class="slabel">Emergency contact</div>
    ${cl.ecName&&cl.ecName.trim()?`
    <div class="irow"><div class="ikey">Name</div><div class="ival">${cl.ecName}</div></div>
    <div class="irow"><div class="ikey">Phone</div><div class="ival"><a href="tel:${cl.ecPhone}" style="color:var(--blue);font-weight:600">${cl.ecPhone}</a></div></div>
    <div class="irow"><div class="ikey">Relationship</div><div class="ival">${cl.ecRel||'Not specified'}</div></div>
    ${cl.ecEmail?`<div class="irow"><div class="ikey">Email</div><div class="ival">${cl.ecEmail}</div></div>`:''}
    `:`<div class="empty">No emergency contact on file</div>`}
  </div>`;
}

function buildCGHours(cg){
  const today=todaySess(cg.id),week=weekSess(cg.id),all=allSess(cg.id);
  const gr={};week.forEach(s=>{const d=fDs(tsMs(s.inTime));(gr[d]=gr[d]||[]).push(s);});
  const wRows=week.length?Object.entries(gr).map(([day,ss])=>`<div class="wdl">${day}</div>${ss.map((s,i)=>`<div class="row"><span style="font-size:14px;color:var(--tx2)">Shift ${i+1} &nbsp;${fT2(tsMs(s.inTime))}&ndash;${fT2(tsMs(s.outTime))}</span><span style="font-size:14px;font-weight:600;color:var(--green)">${fHM(tsMs(s.outTime)-tsMs(s.inTime))}</span></div>`).join('')}`).join(''):`<div class="empty">No shifts this week</div>`;
  return`
  <div class="card">
    <div class="slabel">Summary</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <div class="met"><div class="ml">Today</div><div style="font-size:15px;font-weight:700">${fHM(totMs(today))}</div></div>
      <div class="met"><div class="ml">This week</div><div style="font-size:15px;font-weight:700">${fHM(totMs(week))}</div></div>
      <div class="met"><div class="ml">All time</div><div style="font-size:15px;font-weight:700">${fHM(totMs(all))}</div></div>
    </div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
      <div class="slabel" style="margin:0">This week</div>
      <span style="font-size:14px;font-weight:700;color:var(--green)">${fHM(totMs(week))}</span>
    </div>
    ${wRows}
  </div>`;
}

W.checkGeo=function(){
  const btn=R('geo-btn');if(btn){btn.disabled=true;btn.innerHTML=spin('Getting location...');}
  const as=getAS(st.cgProfile?.id),cl=as?getCL(as.clientId):null;
  if(!cl?.lat){st.locChecked=true;st.locOk=false;st.locErr='No location set.';render();return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{const d=distFt(pos.coords.latitude,pos.coords.longitude,cl.lat,cl.lng);st.locChecked=true;st.locDist=d;st.locOk=d<=100;st.locErr=null;render();},
    err=>{st.locChecked=true;st.locOk=false;st.locDist=null;st.locErr=err.code===1?'Permission denied.':'Could not get location.';render();},
    {enableHighAccuracy:true,timeout:12000,maximumAge:30000}
  );
};

W.doClock=async function(){
  const cg=st.cgProfile;
  if(st.clockedIn){
    await fsSet('sessions',st.openSid,{outTime:Date.now()});
    st.clockedIn=false;st.clockInTime=null;st.openSid=null;
  }else{
    const sid=uid();
    await fsSet('sessions',sid,{cgId:cg.id,inTime:Date.now(),outTime:null,createdAt:Date.now()});
    st.clockedIn=true;st.clockInTime=Date.now();st.openSid=sid;
  }
  await loadDB();render();
};

function startTick(){
  clearInterval(st.tick);
  st.tick=setInterval(()=>{
    const cf=R('cface');if(cf)cf.textContent=fT(Date.now());
    const el=R('cel');if(el&&st.clockedIn&&st.clockInTime)el.textContent=fEl(Date.now()-st.clockInTime);
  },1000);
}

W.logout=async function(){
  clearInterval(st.tick);
  st.isSup=false;st.clockedIn=false;st.clockInTime=null;
  st.locOk=false;st.locChecked=false;st.cgProfile=null;
  await signOut(auth);
};

// Global W namespace
</script>
