<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Care Clock">
<title>Care Clock</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#1D9E75;--green-l:#EAF3DE;--green-d:#0F6E56;--green-t:#3B6D11;
  --red:#E24B4A;--red-l:#FCEBEB;--red-t:#A32D2D;
  --amber:#EF9F27;--amber-l:#FAEEDA;--amber-t:#854F0B;
  --blue:#378ADD;--blue-l:#E6F1FB;--blue-t:#185FA5;
  --purple:#7F77DD;--purple-l:#EEEDFE;--purple-t:#3C3489;
  --bg:#f5f5f3;--card:#fff;--bdr:rgba(0,0,0,.1);--bdr2:rgba(0,0,0,.18);
  --tx:#1a1a1a;--tx2:#555;--tx3:#999;--r:12px;--rs:8px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111;--card:#1e1e1e;--bdr:rgba(255,255,255,.1);--bdr2:rgba(255,255,255,.2);
  --tx:#f0f0f0;--tx2:#aaa;--tx3:#666;
  --green-l:#0a2e1e;--green-t:#5DCAA5;--red-l:#2e0a0a;--red-t:#F09595;
  --amber-l:#2e1e00;--amber-t:#FAC775;--blue-l:#0a1e2e;--blue-t:#85B7EB;
  --purple-l:#1a1840;--purple-t:#AFA9EC;
}}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
#app{max-width:520px;margin:0 auto;padding:1rem;min-height:100vh;}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem;}
.sec-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--tx3);margin-bottom:.75rem;}
.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.av-g{background:var(--green-l);color:var(--green-t);}
.av-b{background:var(--blue-l);color:var(--blue-t);}
.av-p{background:var(--purple-l);color:var(--purple-t);}
.nav{display:flex;background:var(--card);border:1px solid var(--bdr);border-radius:var(--rs);padding:3px;margin-bottom:1rem;gap:2px;}
.nav-tab{flex:1;padding:7px 4px;font-size:12px;font-weight:500;border-radius:6px;cursor:pointer;border:none;background:transparent;color:var(--tx2);}
.nav-tab.on{background:var(--bg);color:var(--tx);font-weight:700;}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
.b-green{background:var(--green-l);color:var(--green-t);}
.b-red{background:var(--red-l);color:var(--red-t);}
.b-blue{background:var(--blue-l);color:var(--blue-t);}
.b-amber{background:var(--amber-l);color:var(--amber-t);}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dg{background:var(--green);animation:pulse 1.5s infinite;}
.dr{background:var(--red);}
.da{background:var(--amber);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn{width:100%;padding:12px;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.98);}
.btn-g{background:var(--green);color:#fff;}.btn-g:hover{opacity:.9;}
.btn-r{background:var(--red);color:#fff;}.btn-r:hover{opacity:.9;}
.btn-b{background:var(--blue);color:#fff;}.btn-b:hover{opacity:.9;}
.btn-o{background:transparent;border:1px solid var(--bdr2);color:var(--tx);}
.btn-o:hover{background:var(--bg);}
.btn:disabled{background:var(--bdr);color:var(--tx3);cursor:not-allowed;transform:none;}
.btn-sm{padding:6px 14px;font-size:13px;font-weight:500;border-radius:var(--rs);cursor:pointer;background:transparent;border:1px solid var(--bdr2);color:var(--tx2);}
.btn-sm:hover{background:var(--bg);}
.btn-icon{padding:6px 10px;font-size:13px;border-radius:var(--rs);cursor:pointer;background:transparent;border:1px solid var(--bdr2);color:var(--tx2);}
.btn-del{background:transparent;border:1px solid rgba(226,75,74,.3);color:var(--red-t);padding:8px 14px;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;width:100%;}
.fld{margin-bottom:.75rem;}
.fld label{display:block;font-size:13px;font-weight:500;color:var(--tx2);margin-bottom:4px;}
.fld input,.fld select,.fld textarea{width:100%;padding:9px 12px;font-size:14px;border:1px solid var(--bdr2);border-radius:var(--rs);background:var(--card);color:var(--tx);outline:none;transition:border .15s;font-family:inherit;}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(55,138,221,.12);}
.fld input::placeholder,.fld textarea::placeholder{color:var(--tx3);}
.fld textarea{resize:vertical;min-height:70px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.hint{font-size:12px;color:var(--tx3);margin-top:4px;line-height:1.4;}
.div{height:1px;background:var(--bdr);margin:.875rem 0;}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.met{background:var(--bg);border-radius:var(--rs);padding:.875rem;}
.met-l{font-size:11px;color:var(--tx3);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;}
.met-v{font-size:20px;font-weight:700;color:var(--tx);}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bdr);}
.row:last-child{border-bottom:none;}
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{text-align:left;padding:8px 6px;border-bottom:1px solid var(--bdr);font-weight:600;color:var(--tx3);font-size:11px;text-transform:uppercase;letter-spacing:.04em;}
.tbl td{padding:9px 6px;border-bottom:1px solid var(--bdr);color:var(--tx);}
.tbl tr:last-child td{border-bottom:none;}
.tbl-scroll{overflow-x:auto;}
.clock-big{font-size:44px;font-weight:300;letter-spacing:-2px;text-align:center;margin:.5rem 0;font-variant-numeric:tabular-nums;color:var(--tx);}
.clock-date{font-size:14px;color:var(--tx2);text-align:center;}
.clock-el{font-size:16px;font-weight:700;color:var(--green);text-align:center;margin-top:4px;font-variant-numeric:tabular-nums;}
.geo{font-size:13px;padding:10px 12px;border-radius:var(--rs);margin-bottom:.75rem;display:flex;align-items:flex-start;gap:8px;line-height:1.5;}
.geo-ok{background:var(--green-l);color:var(--green-t);}
.geo-fail{background:var(--red-l);color:var(--red-t);}
.geo-neu{background:var(--amber-l);color:var(--amber-t);}
.info-row{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--bdr);}
.info-row:last-child{border-bottom:none;}
.info-key{font-size:12px;color:var(--tx3);min-width:120px;padding-top:1px;font-weight:500;}
.info-val{font-size:13px;color:var(--tx);line-height:1.5;}
.empty{font-size:14px;color:var(--tx3);text-align:center;padding:2rem 1rem;}
.smsg{font-size:13px;min-height:18px;margin-bottom:.75rem;line-height:1.5;}
.mok{color:var(--green-t);}.merr{color:var(--red-t);}.mneu{color:var(--tx3);}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--bdr);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes sp{to{transform:rotate(360deg)}}
.noti{font-size:12px;color:var(--tx3);text-align:center;margin-top:.5rem;line-height:1.4;}
.wdl{font-size:12px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin:.75rem 0 4px;}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:1rem;}
.loading-screen p{font-size:14px;color:var(--tx2);}
</style>
</head>
<body>
<div id="app">
  <div class="loading-screen">
    <div class="spin" style="width:24px;height:24px;border-width:3px"></div>
    <p>Loading Care Clock...</p>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, getDocs, collection, addDoc, updateDoc, deleteDoc, query, where, orderBy, serverTimestamp, Timestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ── FIREBASE CONFIG ──
const firebaseConfig = {
  apiKey: "AIzaSyD4JelsMu_NGt3lo9pOYtGgHW0msoUzuQ4",
  authDomain: "care-clock-2adcd.firebaseapp.com",
  projectId: "care-clock-2adcd",
  storageBucket: "care-clock-2adcd.firebasestorage.app",
  messagingSenderId: "345647037416",
  appId: "1:345647037416:web:f68c4f541ebf995ca7025d"
};

const fireApp = initializeApp(firebaseConfig);
const auth = getAuth(fireApp);
const db = getFirestore(fireApp);

// ── STATE ──
let S = {
  view: 'loading',
  supTab: 'dashboard',
  cgTab: 'clock',
  user: null,
  userRole: null, // 'supervisor' | 'caregiver'
  cgProfile: null,
  locOk: false, locChecked: false, locDist: null, locErr: null,
  clockedIn: false, clockInTime: null, openSessionId: null,
  timer: null,
  editCG: null, editCL: null, editAS: null,
  cache: { caregivers: [], clients: [], assignments: [], sessions: [] }
};

// ── HELPERS ──
const $ = id => document.getElementById(id);
function toRad(v){return v*Math.PI/180;}
function distFt(a,b,c,d){const R=3958.8,dL=toRad(c-a),dO=toRad(d-b),x=Math.sin(dL/2)**2+Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dO/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))*5280;}
function fT(ts){return new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function fT2(ts){return new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}
function fD(ts){return new Date(ts).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});}
function fDs(ts){return new Date(ts).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function fEl(ms){const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return`${h}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;}
function fHM(ms){const t=Math.floor(ms/60000),h=Math.floor(t/60),m=t%60;return`${h}h ${m}m`;}
function ini(n){return(n||'?').trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function setMsg(id,html,cls){const e=$(id);if(e){e.className='smsg '+cls;e.innerHTML=html;}}
function uid(){return Math.random().toString(36).slice(2,9);}

function tsToMs(ts){
  if(!ts) return 0;
  if(typeof ts==='number') return ts;
  if(ts.toMillis) return ts.toMillis();
  if(ts.seconds) return ts.seconds*1000;
  return new Date(ts).getTime();
}

// ── FIRESTORE HELPERS ──
async function fsGet(col, id){ const d = await getDoc(doc(db,col,id)); return d.exists()?{id:d.id,...d.data()}:null; }
async function fsSet(col, id, data){ await setDoc(doc(db,col,id), data, {merge:true}); }
async function fsAdd(col, data){ const r = await addDoc(collection(db,col), data); return r.id; }
async function fsDel(col, id){ await deleteDoc(doc(db,col,id)); }
async function fsAll(col){ const s = await getDocs(collection(db,col)); return s.docs.map(d=>({id:d.id,...d.data()})); }
async function fsQuery(col, field, op, val){ const q = query(collection(db,col), where(field,op,val)); const s = await getDocs(q); return s.docs.map(d=>({id:d.id,...d.data()})); }

// ── LOAD CACHE ──
async function loadCache(){
  const [cgs, cls, ass, sess] = await Promise.all([
    fsAll('caregivers'), fsAll('clients'), fsAll('assignments'), fsAll('sessions')
  ]);
  S.cache.caregivers = cgs;
  S.cache.clients = cls;
  S.cache.assignments = ass;
  S.cache.sessions = sess;
}

function getCG(id){ return S.cache.caregivers.find(c=>c.id===id); }
function getCL(id){ return S.cache.clients.find(c=>c.id===id); }
function getAS(cgId){ return S.cache.assignments.find(a=>a.cgId===cgId); }
function cgTodaySess(cgId){ const t=new Date().toDateString(); return S.cache.sessions.filter(s=>s.cgId===cgId&&s.outTime&&new Date(tsToMs(s.inTime)).toDateString()===t); }
function cgWeekSess(cgId){ const now=new Date(),d=now.getDay(),st=new Date(now);st.setDate(now.getDate()-d);st.setHours(0,0,0,0); return S.cache.sessions.filter(s=>s.cgId===cgId&&s.outTime&&new Date(tsToMs(s.inTime))>=st); }
function cgAllSess(cgId){ return S.cache.sessions.filter(s=>s.cgId===cgId&&s.outTime); }
function totMs(arr){ return arr.reduce((s,x)=>s+(tsToMs(x.outTime)-tsToMs(x.inTime)),0); }

// ── AUTH STATE ──
onAuthStateChanged(auth, async user => {
  if(user){
    S.user = user;
    // Check if supervisor
    const supDoc = await fsGet('settings','supervisor');
    if(supDoc && supDoc.email === user.email){
      S.userRole='supervisor';
      await loadCache();
      S.view='supervisor'; S.supTab='dashboard';
    } else {
      // Find caregiver profile
      const cgs = await fsQuery('caregivers','email','==',user.email);
      if(cgs.length>0){
        S.userRole='caregiver';
        S.cgProfile=cgs[0];
        await loadCache();
        // Check for open session
        const open = S.cache.sessions.find(s=>s.cgId===cgs[0].id&&!s.outTime);
        if(open){ S.clockedIn=true; S.clockInTime=tsToMs(open.inTime); S.openSessionId=open.id; }
        else { S.clockedIn=false; S.clockInTime=null; }
        S.view='caregiver'; S.cgTab='clock';
      } else {
        await signOut(auth);
        S.view='login';
      }
    }
  } else {
    S.user=null; S.userRole=null; S.cgProfile=null;
    S.view='login';
  }
  render();
});

// ── RENDER ──
function render(){
  const app=$('app'); app.innerHTML=''; clearInterval(S.timer);
  if(S.view==='loading'){ app.innerHTML=`<div class="loading-screen"><div class="spin" style="width:24px;height:24px;border-width:3px"></div><p>Loading...</p></div>`; return; }
  if(S.view==='login') app.appendChild(bLogin());
  else if(S.view==='supervisor') app.appendChild(bSupervisor());
  else if(S.view==='caregiver') app.appendChild(bCaregiver());
}

// ══════════════════════════════════════
// LOGIN
// ══════════════════════════════════════
function bLogin(){
  const w=document.createElement('div'); w.style.padding='2rem 0';
  w.innerHTML=`
  <div style="text-align:center;margin-bottom:1.5rem">
    <div style="width:64px;height:64px;border-radius:50%;background:var(--green-l);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:28px">&#128305;</div>
    <div style="font-size:26px;font-weight:700;color:var(--tx)">Care Clock</div>
    <div style="font-size:14px;color:var(--tx2);margin-top:4px">Secure caregiver time management</div>
  </div>
  <div class="card">
    <div class="fld"><label>Email address</label><input id="l-email" type="email" placeholder="your@email.com" autocomplete="email"></div>
    <div class="fld"><label>Password</label><input id="l-pass" type="password" placeholder="Enter your password" autocomplete="current-password"></div>
    <div id="l-msg" class="smsg merr" style="min-height:16px"></div>
    <button class="btn btn-g" id="l-btn" onclick="doLogin()">Sign in</button>
  </div>
  <div style="text-align:center;font-size:12px;color:var(--tx3);margin-top:.5rem">First time? Set up supervisor account below</div>
  <div id="setup-section" style="margin-top:1rem">
    <div class="card" style="border:1px dashed var(--bdr2)">
      <div style="font-size:13px;font-weight:600;color:var(--tx);margin-bottom:.75rem">First-time supervisor setup</div>
      <div class="fld"><label>Your email</label><input id="s-email" type="email" placeholder="supervisor@email.com" autocomplete="off"></div>
      <div class="fld"><label>Create password</label><input id="s-pass" type="password" placeholder="Min 6 characters" autocomplete="off"></div>
      <div id="s-msg" class="smsg mneu" style="min-height:16px"></div>
      <button class="btn btn-b" onclick="doSetupSupervisor()">Create supervisor account</button>
    </div>
  </div>`;
  setTimeout(()=>{
    // Hide setup if supervisor already exists
    fsGet('settings','supervisor').then(s=>{ if(s&&$('setup-section')) $('setup-section').style.display='none'; });
    const p=$('l-pass'); if(p) p.onkeydown=e=>{if(e.key==='Enter')doLogin();};
  },0);
  return w;
}

async function doLogin(){
  const email=($('l-email').value||'').trim();
  const pass=($('l-pass').value||'').trim();
  if(!email||!pass){setMsg('l-msg','Please enter email and password.','merr');return;}
  const btn=$('l-btn'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>Signing in...';
  try{
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e){
    let msg='Incorrect email or password.';
    if(e.code==='auth/user-not-found') msg='No account found with that email.';
    if(e.code==='auth/wrong-password') msg='Incorrect password.';
    if(e.code==='auth/too-many-requests') msg='Too many attempts. Try again later.';
    setMsg('l-msg',msg,'merr');
    btn.disabled=false; btn.innerHTML='Sign in';
  }
}

async function doSetupSupervisor(){
  const email=($('s-email').value||'').trim();
  const pass=($('s-pass').value||'').trim();
  if(!email||!pass){setMsg('s-msg','Please enter email and password.','merr');return;}
  if(pass.length<6){setMsg('s-msg','Password must be at least 6 characters.','merr');return;}
  setMsg('s-msg','<span class="spin"></span>Creating account...','mneu');
  try{
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await fsSet('settings','supervisor',{email, createdAt: Date.now()});
  } catch(e){
    let msg='Could not create account.';
    if(e.code==='auth/email-already-in-use') msg='An account with this email already exists. Try signing in.';
    setMsg('s-msg',msg,'merr');
  }
}

// ══════════════════════════════════════
// SUPERVISOR
// ══════════════════════════════════════
function bSupervisor(){
  const w=document.createElement('div');
  w.innerHTML=`
  <div class="hrow">
    <div><div style="font-size:20px;font-weight:700;color:var(--tx)">Supervisor Portal</div><div style="font-size:13px;color:var(--tx2)">Care Clock Management</div></div>
    <button class="btn-sm" onclick="doLogout()">Sign out</button>
  </div>
  <div class="nav">
    <button class="nav-tab ${S.supTab==='dashboard'?'on':''}" onclick="supTab('dashboard')">Dashboard</button>
    <button class="nav-tab ${S.supTab==='caregivers'?'on':''}" onclick="supTab('caregivers')">Caregivers</button>
    <button class="nav-tab ${S.supTab==='clients'?'on':''}" onclick="supTab('clients')">Clients</button>
    <button class="nav-tab ${S.supTab==='assignments'?'on':''}" onclick="supTab('assignments')">Assign</button>
    <button class="nav-tab ${S.supTab==='reports'?'on':''}" onclick="supTab('reports')">Reports</button>
  </div>
  <div id="sup-body"></div>`;
  setTimeout(()=>{
    const b=$('sup-body'); if(!b) return;
    if(S.supTab==='dashboard') b.appendChild(bSupDash());
    else if(S.supTab==='caregivers') b.appendChild(bSupCG());
    else if(S.supTab==='clients') b.appendChild(bSupCL());
    else if(S.supTab==='assignments') b.appendChild(bSupAS());
    else if(S.supTab==='reports') b.appendChild(bSupReports());
  },0);
  return w;
}
function supTab(t){S.supTab=t;S.editCG=null;S.editCL=null;S.editAS=null;render();}

// Dashboard
function bSupDash(){
  const w=document.createElement('div');
  const active=S.cache.sessions.filter(s=>!s.outTime);
  const today=S.cache.sessions.filter(s=>s.outTime&&new Date(tsToMs(s.inTime)).toDateString()===new Date().toDateString());
  w.innerHTML=`
  <div class="mgrid">
    <div class="met"><div class="met-l">Caregivers</div><div class="met-v">${S.cache.caregivers.length}</div></div>
    <div class="met"><div class="met-l">Clients</div><div class="met-v">${S.cache.clients.length}</div></div>
    <div class="met"><div class="met-l">Active now</div><div class="met-v" style="color:var(--green)">${active.length}</div></div>
    <div class="met"><div class="met-l">Shifts today</div><div class="met-v">${today.length}</div></div>
  </div>
  <div class="card">
    <div class="sec-label">Currently clocked in</div>
    ${active.length?active.map(s=>{
      const cg=getCG(s.cgId);
      const as=getAS(s.cgId);
      const cl=as?getCL(as.clientId):null;
      return`<div class="row">
        <div style="display:flex;align-items:center;gap:10px">

function pinCL(){
  const btn=$('cl-pin-btn'),st=$('cl-pin-st');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>Getting GPS...';}
  navigator.geolocation.getCurrentPosition(pos=>{
    window._clLat=pos.coords.latitude;window._clLng=pos.coords.longitude;
    if(st)st.textContent=`${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;
    if(btn){btn.disabled=false;btn.innerHTML='&#x2713; Pinned!';}
  },err=>{
    if(st){st.style.color='var(--red-t)';st.textContent=err.code===1?'Permission denied.':'Could not get location.';}
    if(btn){btn.disabled=false;btn.innerHTML='&#x1F4CD; Pin location at address';}
  },{enableHighAccuracy:true,timeout:12000,maximumAge:0});
}

function exportCSV(){
  const hdr=['Caregiver','Email','Client','Date','Clock In','Clock Out','Duration (hrs)','Duration (min)'];
  const rows=S.cache.sessions.filter(s=>s.outTime).map(s=>{
    const cg=getCG(s.cgId);
    const as=getAS(s.cgId);
    const cl=as?getCL(as.clientId):null;
    const ms=tsToMs(s.outTime)-tsToMs(s.inTime);
    return[cg?.name||'',cg?.email||'',cl?.name||'',fDs(tsToMs(s.inTime)),fT2(tsToMs(s.inTime)),fT2(tsToMs(s.outTime)),(ms/3600000).toFixed(2),Math.round(ms/60000)];
  });
  const csv=[hdr,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='care_clock_report.csv';a.click();URL.revokeObjectURL(url);
}

function bCGClock(cg,cl){
  const elapsed=S.clockedIn&&S.clockInTime?Date.now()-S.clockInTime:0;
  const todayMs=totMs(cgTodaySessions(cg.id));
  let gHtml='';
  if(!cl){ gHtml=`<div class="geo geo-neu"><div class="dot da" style="margin-top:3px"></div><span>No active assignment. Contact your supervisor.</span></div>`; }
  else if(!cl.lat){ gHtml=`<div class="geo geo-neu"><div class="dot da" style="margin-top:3px"></div><span>Care location not set. Contact your supervisor.</span></div>`; }
  else if(!S.locChecked){ gHtml=`<div class="geo geo-neu"><div class="dot da" style="margin-top:3px"></div><span>Tap below to verify you are at the care location</span></div>`; }
  else if(S.locOk){ gHtml=`<div class="geo geo-ok"><div class="dot dg" style="margin-top:3px"></div><span>Within range &mdash; ${Math.round(S.locDist)} ft from ${cl.name}'s address</span></div>`; }
  else { gHtml=`<div class="geo geo-fail"><div class="dot dr" style="margin-top:3px"></div><span>${S.locDist!==null?`You are ${Math.round(S.locDist)} ft away. `:''}You must be within 100 ft of ${cl.name}'s address to clock in. Please go to the care location.</span></div>`; }

  const badge=S.clockedIn?`<div class="badge b-green"><div class="dot dg"></div>Clocked in</div>`:`<div class="badge b-red"><div class="dot dr"></div>Clocked out</div>`;
  const canClock=cl&&cl.lat;
  const mainBtn=S.clockedIn?`<button class="btn btn-r" onclick="doClock()">Clock out</button>`:
    (canClock&&S.locOk)?`<button class="btn btn-g" onclick="doClock()">Clock in</button>`:
    `<button class="btn" disabled>${!canClock?'No assignment':'Must be within 100 ft to clock in'}</button>`;
  const w=document.createElement('div');
  w.innerHTML=`
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
      ${badge}
      <div class="clock-el" id="eld" style="${S.clockedIn?'':'display:none'}">${fEl(elapsed)}</div>
    </div>
    <div class="clock-big" id="cf">${fT(Date.now())}</div>
    <div class="clock-date">${fD(Date.now())}</div>
    <div class="div"></div>
    ${gHtml}
    ${canClock?`<button class="btn btn-o" style="margin-bottom:.75rem" id="geo-btn" onclick="checkGeo()">&#x1F4CD; Verify my location</button>`:''}
    ${mainBtn}
    ${cl?`<div class="noti">Must be within 100 ft of ${cl.address}</div>`:''}
  </div>
  <div class="card">
    <div class="sec-label">Today at a glance</div>
    <div class="mgrid">
      <div class="met"><div class="met-l">Shifts today</div><div class="met-v">${cgTodaySessions(cg.id).length}</div></div>
      <div class="met"><div class="met-l">Hours today</div><div class="met-v">${fHM(todayMs)}</div></div>
    </div>
  </div>`;
  startTick();
  return w;
}

    <div class="sec-label">Client information</div>
    <div class="info-row"><div class="info-key">Address</div><div class="info-val">${cl.address}</div></div>
    <div class="info-row"><div class="info-key">Schedule</div><div class="info-val">${cl.schedule||'Not specified'}</div></div>
    <div class="info-row"><div class="info-key">Assignment start</div><div class="info-val">${as.startDate||'Not set'}</div></div>
    <div class="info-row"><div class="info-key">Assignment end</div><div class="info-val">${as.endDate||'Ongoing'}</div></div>
    ${cl.notes?`<div class="info-row"><div class="info-key">Care notes</div><div class="info-val">${cl.notes}</div></div>`:''}
  </div>
  <div class="card">
    <div class="sec-label">Emergency contact</div>
    ${cl.ecName?`
    <div class="info-row"><div class="info-key">Name</div><div class="info-val">${cl.ecName}</div></div>
    <div class="info-row"><div class="info-key">Phone</div><div class="info-val"><a href="tel:${cl.ecPhone}" style="color:var(--blue);font-weight:600">${cl.ecPhone}</a></div></div>
    <div class="info-row"><div class="info-key">Relationship</div><div class="info-val">${cl.ecRel||'Not specified'}</div></div>
    `:`<div class="empty">No emergency contact on file</div>`}
  </div>`;
  return w;
}

function bCGHours(cg){
  const today=cgTodaySessions(cg.id);
  const week=cgWeekSess(cg.id);
  const all=cgAllSess(cg.id);
  const gr={};
  week.forEach(s=>{const d=fDs(tsToMs(s.inTime));(gr[d]=gr[d]||[]).push(s);});
  const weekRows=week.length?Object.entries(gr).map(([day,ss])=>`
    <div class="wdl">${day}</div>
    ${ss.map((s,i)=>`<div class="row"><span style="font-size:14px;color:var(--tx2)">Shift ${i+1} &nbsp; ${fT2(tsToMs(s.inTime))} &ndash; ${fT2(tsToMs(s.outTime))}</span><span style="font-size:14px;font-weight:600;color:var(--green)">${fHM(tsToMs(s.outTime)-tsToMs(s.inTime))}</span></div>`).join('')}`).join(''):`<div class="empty">No shifts this week</div>`;
  const w=document.createElement('div');
  w.innerHTML=`
  <div class="card">
    <div class="sec-label">Summary</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <div class="met"><div class="met-l">Today</div><div style="font-size:15px;font-weight:700;color:var(--tx)">${fHM(totMs(today))}</div></div>
      <div class="met"><div class="met-l">This week</div><div style="font-size:15px;font-weight:700;color:var(--tx)">${fHM(totMs(week))}</div></div>
      <div class="met"><div class="met-l">All time</div><div style="font-size:15px;font-weight:700;color:var(--tx)">${fHM(totMs(all))}</div></div>
    </div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
      <div class="sec-label" style="margin:0">This week</div>
      <span style="font-size:14px;font-weight:700;color:var(--green)">${fHM(totMs(week))}</span>
    </div>
    ${weekRows}
  </div>`;
  return w;
}

// ── GEO ──
function checkGeo(){
  const btn=$('geo-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>Getting location...';}
  const as=getAS(S.cgProfile?.id);
  const cl=as?getCL(as.clientId):null;
  if(!cl?.lat){S.locChecked=true;S.locOk=false;S.locErr='No location set.';render();return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{const d=distFt(pos.coords.latitude,pos.coords.longitude,cl.lat,cl.lng);S.locChecked=true;S.locDist=d;S.locOk=d<=100;S.locErr=null;render();},
    err=>{S.locChecked=true;S.locOk=false;S.locDist=null;S.locErr=err.code===1?'Permission denied.':'Could not get location.';render();},
    {enableHighAccuracy:true,timeout:12000,maximumAge:30000}
  );
}

// ── CLOCK IN/OUT ──
async function doClock(){
  const cg=S.cgProfile;
  if(S.clockedIn){
    await fsSet('sessions',S.openSessionId,{outTime:Date.now()});
    S.clockedIn=false;S.clockInTime=null;S.openSessionId=null;
  } else {
    const sid=uid();
    await fsSet('sessions',sid,{cgId:cg.id,inTime:Date.now(),outTime:null,createdAt:Date.now()});
    S.clockedIn=true;S.clockInTime=Date.now();S.openSessionId=sid;
  }
  await loadCache();
  render();
}

// ── TICK ──
function startTick(){
  clearInterval(S.timer);
  S.timer=setInterval(()=>{
    const cf=$('cf');if(cf)cf.textContent=fT(Date.now());
    const ed=$('eld');if(ed&&S.clockedIn&&S.clockInTime)ed.textContent=fEl(Date.now()-S.clockInTime);
  },1000);
}

// ── LOGOUT ──
async function doLogout(){
  clearInterval(S.timer);
  S.clockedIn=false;S.clockInTime=null;
  S.locOk=false;S.locChecked=false;
  await signOut(auth);
}

// Expose to global scope for onclick handlers
window.doLogin=doLogin;
window.doSetupSupervisor=doSetupSupervisor;

window.exportCSV=exportCSV;
window.checkGeo=checkGeo;
window.doClock=doClock;
window.doLogout=doLogout;

window.S=S;

</script>
